# Reglas del guardián de consistencia (la MÁXIMA: todo 100% alineado SIEMPRE).
# Las corre tools/check_consistency.py contra reports/governance/key_facts.json (fuente de verdad,
# generada por experiments/build_key_facts.py). `{fact}` se sustituye por su valor.
#
# Tipos de regla:
#   forbidden : el patrón NO debe aparecer en ningún artefacto de `in` (drift/claim viejo).
#               Se omiten comentarios LaTeX (líneas que empiezan con %).
#   required  : al menos UNA de `forms` debe aparecer en el grupo de `in`.
#   numeric   : donde aparezca `label` (1 grupo de captura numérico, tolerante a separadores
#               LaTeX 27{,}289 / 27\,289), el número debe igualar el `fact`.
#
# Nota: las forbidden se aplican SOLO a los artefactos publicados (deliverable, paper, web),
# NO a las meta-docs (reports/paper_micai/PAPER_PROSPECTIVE_DRAFT) que citan los claims-malos como ejemplo.

artifacts:
  deliverable: ["reports/latex/ProyectoI_VisaPredictAI.tex"]
  paper: ["reports/paper_micai/paper.tex", "reports/paper_micai/README.md"]
  readmes: ["README.md"]
  # audit ciego r3 (5-jul): el model card publica "N modelos" (derivado de
  # n_models) y el RAG del sitio lo indexa como fuente del veredicto del bot —
  # debe seguir a key_facts o el VisaBot cita un catálogo fósil.
  # D1 (plan auditoría 11-jul): FORECAST_EVAL.md es la matriz canónica de protocolos —
  # sus cifras/claims sobrevivieron 2 re-campañas sin vigilancia (0.121±0.008, √h como
  # método vigente); ahora el grupo governance lo cubre.
  governance: ["reports/governance/MODEL_CARD.md", "docs/FORECAST_EVAL.md"]
  # content/source.html = la fuente ES (incluye #datos); el lado EN son páginas sueltas.
  # TODO el contenido publicado se vigila (audit 3-jul: capii/capiii/tablas quedaban fuera
  # de esta lista y por eso sus "~290/~125" sobrevivieron dos generaciones de cifras).
  # Audit web 4-jul (plan AT): los COMPONENTES React también publican prosa con cifras
  # (hero "27,289" vivió en prod sin vigilancia) — se escanean components/ y lib/ del web.
  # lib/content/ NO entra (generado desde los mismos .html ya vigilados).
  web: [
    "../VisaPredictAI_web/content/*.html",
    "../VisaPredictAI_web/content/en/*.html",
    "../VisaPredictAI_web/components/*.tsx",
    "../VisaPredictAI_web/components/sections/*.tsx",
    "../VisaPredictAI_web/components/pages/*.tsx",
    "../VisaPredictAI_web/components/tables/*.tsx",
    "../VisaPredictAI_web/components/visabot/*.tsx",
    "../VisaPredictAI_web/components/ui/*.tsx",
    "../VisaPredictAI_web/lib/*.ts",
    "../VisaPredictAI_web/lib/data/*.ts",
    "../VisaPredictAI_web/lib/visabot/*.ts",
    # audit post-plan: metadata/titles y la 404 tambien publican prosa
    "../VisaPredictAI_web/app/*.tsx",
    "../VisaPredictAI_web/app/*/*.tsx",
    "../VisaPredictAI_web/app/*/*/*.tsx",
  ]

forbidden:
  - pattern: 'holgura|holgada'
    in: [deliverable, paper]
    reason: 'el deep NO gana DFF "con holgura"; es ventaja modesta ~11% y frágil'
  - pattern: 'gana en DFF e iguala en FAD'
    in: [deliverable, paper]
    reason: 'frase vieja triunfalista; usar "supera por un margen modesto en DFF"'
  - pattern: '\b15\s*\\?,?\s*%\s*mejor'
    in: [deliverable, paper]
    reason: 'el margen DFF reconciliado es ~11% vs Auto-ARIMA, no "15% mejor" vs baseline débil'
  - pattern: '(BiTCN|deep|profund)\w*[^.]{0,45}\b23\s*\\?,?\s*%|\b23\s*\\?,?\s*%[^.]{0,45}(BiTCN|DFF|deep)'
    in: [deliverable, paper, readmes]
    reason: 'el "23%" provenía de CatBoost (baseline débil); el margen real es ~11%'
  - pattern: 'modela\w*\s+(las\s+)?194\s+series|194\s+series\s+modela'
    in: [deliverable, paper, readmes, web]
    reason: '194 son ESTRUCTURALES; solo ~74 evaluables (>=84 obs F)'
  # \b en ambos lados: con IGNORECASE, "FAD" matcheaba dentro de \factThetaFadMean (AH1)
  - pattern: '\bFAD\b[^.;]{0,90}0\.10[67]|0\.10[67][^.;]{0,60}\bFAD\b'
    in: [deliverable, paper, readmes]
    reason: '0.106/0.107 son los hold-out DFF de ETS/Theta; los campeones FAD valen 0.119/0.118 (misatribución detectada en audit 2-jul-2026)'
  - pattern: '\b65\b[^%<]{0,12}(pruebas|tests|pytest)|metric-num">65<'
    in: [deliverable, paper, readmes, web]
    reason: 'el conteo "65 tests" quedó fósil (la suite colecta 139); actualizar al conteo real al citar la suite (audit 2-jul-2026)'
  # --- claims del deliverable (audit 3-jul-2026: estos residuos sobrevivieron a la propagación) ---
  - pattern: '(AutoBiTCN|modelo profundo|deep model|aprendizaje profundo)[^.\n]{0,80}\b(empata|empate|iguala)\b'
    in: [deliverable]
    reason: 'framing muerto: el deep ni "empata" ni gana — AutoBiTCN 0.109 baja de ETS/Theta pero el piso es el naïve-1 (0.100)'
  - pattern: '\bas a tie\b|deep model (only )?match(es|ing)'
    in: [paper]
    reason: 'FAD nunca fue "tie": AutoBiTCN 0.109 queda bajo ETS/Theta pero sobre el piso naïve-1; usar el framing del RW-floor'
  - pattern: 'listón[^0-9\n]{0,25}0\.11[19]|0\.11[19][^0-9\n]{0,15}listón'
    in: [deliverable, paper]
    reason: 'listones seleccion viejos (0.109 pre-resurrección / 0.111 pre-AQ); el vigente es fad_champion_mase (hoy 0.110)'
  # --- tripwires de la re-campaña AQ (4-jul-2026): valores/frases de la era pre-naive1 ---
  - pattern: '\[0\.112,\s*0\.131\]|(\\pm|±)\s*0\.008'
    in: [deliverable, paper, governance]
    reason: 'intervalo multi-semilla muerto de AutoBiTCN (0.121±0.008); vigente 0.109±0.007 [0.100, 0.118]'
  - pattern: 'ya no empata|YA NO empata'
    in: [deliverable, paper]
    reason: 'frase de la era 3-jul ("AutoBiTCN ya no empata"); el framing vigente es el piso del naïve-1'
  - pattern: '\{\s*ETS\s*,\s*Theta\s*\}|ETS (y|and) Theta (entran|enter|forman|form)[^.\n]{0,40}(MCS|confidence set|conjunto de confianza)|(MCS|conjunto de confianza(?: de modelos)?)[^.\n]{0,40}=\s*\{?\s*ETS'
    in: [deliverable, paper, governance]
    reason: 'MCS viejo ({ETS, Theta}); tras la re-campaña AQ el MCS al 90% retiene SOLO al naïve-1 en ambas tablas'
  - pattern: 'ensancha[^.\n]{0,40}(raíz|\\sqrt)|widen[^.\n]{0,40}\\sqrt|0\.4744'
    in: [deliverable, paper]
    reason: 'el PI desplegado ya NO ensancha por raíz del horizonte ni usa el ratio escalar 0.4744; usa cuantiles empíricos por horizonte + ACI'
  - pattern: 'los seis casos mejoran|the six cases improve|hasta un \$?32\$?\s*\\?,?\s*\\?%'
    in: [deliverable, paper]
    reason: 'claim de tuning viejo (aceptación sobre el hold-out); vigente: 11/12 grupos aceptados en val-confirm con media+mediana+% series (derivado: \factTuningAccepted/\factTuningGroups)'
  - pattern: '(7|siete)\s+de\s+(los\s+)?(12|doce)\s+grupos|7/12\s+grupos|\bdos de sus seis grupos'
    in: [deliverable, paper]
    reason: 'conteo de tuning MUERTO (7/12 y "dos de sus seis" = era AQ 4-jul); la re-campaña 6-jul aceptó 11/12 (family 5/6, employment 6/6) — usar las macros \factTuningAccepted/\factTuningGroups/\factTuningAcceptedEmployment, no literales'
  - pattern: 'MASE[\s\$=~]{0,4}0\.225|0\.225[^0-9]{0,20}(zero-?shot|Chronos)'
    in: [deliverable, paper, web]
    reason: 'Chronos 0.225 es de la era pre-máscara; el vigente es 0.207 sel (sobrevivió 2 generaciones hasta el audit 3-jul)'
  - pattern: '2\.612'
    in: [deliverable, paper, web]
    reason: 'TFT 2.612 es de la era pre-máscara; vigentes 2.419 (FAD) / 2.703 (DFF)'
  - pattern: '0\.1116|0\.1165|\+8\.1\s*\\?,?\s*\\?%'
    in: [deliverable, paper]
    reason: 'champion/curada/selección-por-serie pre-resurrección (0.1183 / empatada / +9.7% vigentes)'
  - pattern: '(~|≈|\\sim\s*\$?\s*)29[04]\b|\b29[04]\s*~?\s*obs'
    in: [deliverable, paper, readmes, web]
    reason: 'el "~290 obs" murió con la resurrección: son 296 meses completos'
  - pattern: '(~|≈|\\sim\s*\$?\s*)125\s*~?\s*obs|noviembre\s*(de\s*)?2015|November[\s&nbsp;]*2015'
    in: [deliverable, paper, readmes, web]
    reason: 'DFF existe desde OCTUBRE 2015 con 130 obs (no "~125 / noviembre")'
  # --- tripwires del audit blind 4-jul-2026 (fósiles cazados en el deliverable) ---
  - pattern: '\$?21\$?\s+(modelos|models)\b'
    in: [deliverable, paper]
    reason: 'el repertorio vigente es de 24 modelos; "$21$ modelos" es fósil pre-AQ (sobrevivía en A.2)'
  - pattern: 'China/F4'
    in: [deliverable, paper]
    reason: 'la única falla numérica de SARIMA en FAD fue India/F3 (fila NaN de model_comparison_FAD21.csv), no China/F4'
  - pattern: '0\.1155'
    in: [deliverable, paper]
    reason: 'TabPFN 0.1155 es de la era pre-resurrección (CSV 19-jun); re-puntuado F-only sobre el panel vigente: 0.1175 media / 0.1111 mediana'
  # --- tripwires del plan WEB BRUTAL (épica AT, 4-jul-2026): fósiles cazados EN PRODUCCIÓN ---
  - pattern: '27[\s.,{}\\]*289\b'
    in: [deliverable, paper, readmes, web]
    reason: 'conteo muerto del panel (añada intermedia fosilizada en el hero); el vigente es n_obs — el hero ahora deriva de site-stats.generated'
  - pattern: '27[\s.,{}\\]*277\b'
    in: [deliverable, paper, readmes, web]
    reason: 'conteo del panel de la era pre-resurrección I1; el vigente es n_obs'
  - pattern: '\b291[-\s]?(?:month|mes)'
    in: [web]
    reason: 'comentario fósil "291-month history" en analytics.ts; el panel tiene n_months meses (los comentarios también drift-ean)'
  - pattern: '(cuatro|cinco|four|five)\s+part(es|s)\b'
    in: [web]
    reason: 'el titular de Explore no debe contar rutas a mano (caducó como "cuatro partes" con 5 tarjetas en prod)'
  - pattern: '\$?21\$?\s+(modelos|models)\b'
    in: [web]
    reason: 'catálogo fósil pre-AQ; la prosa web debe seguir a n_models (regla numeric)'
  - pattern: '(veinti\w+|dieci\w+|twenty-?\w+|eighteen|nineteen)[-\s]+(modelos|models)\b'
    in: [web]
    reason: 'conteos de modelos deletreados esquivan la regla numeric n_models (hueco cazado por el audit post-plan)'

required:
  - fact: n_series_structural
    forms: ['{n_series_structural}\s+series', '{n_series_structural}[^.0-9]{0,15}estructural', '\\factNSeriesStructural']
    in: [deliverable, paper]
    reason: 'el tamaño del panel (194 series) debe figurar'
  - fact: deep_dff_margin_pct
    forms: ['{deep_dff_margin_pct}\s*\\?,?\s*\\?%', '\\sim\s*\$?{deep_dff_margin_pct}', '\\factDeepDffMarginPct']
    in: [deliverable, paper]
    reason: 'el margen DFF deep-vs-Auto-ARIMA (~21%, re-anclado: el naïve-1 lo disuelve) debe figurar'
  # --- re-campaña AQ: el piso del naïve-1 es LA cifra insignia; su claim MCS debe figurar ---
  # gaps con [^.] (no [^.\n]): la prosa LaTeX envuelve líneas y el claim cruza saltos de línea
  - fact: naive1_fad_mean
    forms: ['(MCS|conjunto de\s+confianza)[^.]{0,160}na[iï]ve-?1', 'na[iï]ve-?1[^.]{0,260}(MCS|model confidence set|conjunto de\s+confianza)']
    in: [deliverable, paper]
    reason: 'el claim MCS={naive1} (el hallazgo central de la re-campaña AQ) debe figurar'
  - fact: autoarima_dff_mean
    forms: ['Auto-?ARIMA']
    in: [deliverable, paper]
    reason: 'el baseline clásico afinado (Auto-ARIMA) debe estar citado'
  - fact: n_series_evaluable
    forms: ['{n_series_evaluable}\s+(series\s+)?(plenamente\s+)?evaluabl', 'evaluabl\w*[^.]{0,25}{n_series_evaluable}']
    in: [paper, deliverable, web]
    reason: 'paper/deliverable/web deben distinguir 74 evaluables de 194 estructurales'
  - fact: prosp_n_scored
    forms: ['2\{?,?\}?944', '{prosp_n_scored}']
    in: [paper]
    reason: 'el tamaño de la evaluación prospectiva (2944) debe figurar en el paper'
  - fact: ets_fad_mean
    forms: ['{ets_fad_mean}']
    in: [deliverable, paper]
    reason: 'el hold-out FAD de ETS (la cifra insignia del régimen parsimonioso) debe figurar'
  - fact: theta_fad_mean
    forms: ['{theta_fad_mean}']
    in: [deliverable, paper]
    reason: 'el hold-out FAD de Theta debe figurar'
  - fact: prosp_mase
    forms: ['{prosp_mase}']
    in: [paper]
    reason: 'el MASE prospectivo (titular de honestidad del paper) debe coincidir con el scorecard vigente'
  # A1 (plan auditoría dos repos, 2026-07-11): el registro prospectivo actual es un
  # backfill sin fuga — el caveat debe figurar en paper, deliverable, model card y web
  # hasta que las añadas servidas en vivo dominen la muestra. NO quitar sin decisión A4.
  - fact: prosp_n_scored
    forms: ['[Bb]ackfill']
    in: [paper, deliverable, governance, web]
    reason: 'el scorecard vigente es backfill sin fuga (no pronósticos servidos en tiempo real); el caveat A1 no puede desaparecer'
  # AH1/AH5: el deliverable debe \input las macros derivadas — si alguien quita el
  # input, toda la prosa macro-izada dejaría de compilar/alinearse en silencio.
  - fact: n_obs
    forms: ['\\input\{key_facts\}']
    in: [deliverable]
    reason: 'ProyectoI.tex debe hacer \input{key_facts} (cifras canónicas derivadas, no tipeadas)'
  - fact: n_obs
    forms: ['\\input\{fe_facts\}']
    in: [deliverable]
    reason: 'ProyectoI.tex debe hacer \input{fe_facts} (selección FRESH/mRMR derivada del catálogo FE)'

numeric:
  # obs TOTAL del panel: "27,289 obs/observaciones/observations/filas/rows" pero NO "obs
  # entrenables" (eso es F). OJO: \w* tras "observaci"/"observation" es OBLIGATORIO — un \b
  # tras "observaci" NUNCA cierra en "observaci|ones" (ambos \w) y dejaba esas líneas (ES y
  # el paper inglés "observations") SIN proteger (hallazgo del audit dúo, jun-2026).
  - fact: n_obs
    label: '([0-9]{2}[.,{}\\\s]*[0-9]{3})\s*~?(?:obs\.?|observaci\w*|observation\w*|filas|rows|registros)(?![^<\n]{0,15}entrenabl)'
    in: [deliverable, paper, readmes, web]
    reason: 'conteo de observaciones TOTAL del panel'
  # --- Censo EDA (audit 3-jul H3): las cifras que la prosa web/.tex cita del censo ---
  # dos formas (reglas separadas: la alternación rompería el grupo de captura). El
  # conteo de instantáneas S3 ("298 boletines" en la capa BRONCE) es OTRO hecho
  # (la fuente publica 1-2 meses por delante del panel) y no debe matchear.
  - fact: n_months
    label: '([0-9]{3})(?:\s*/\s*[0-9]{3}|\s+de\s+[0-9]{3})[\s\\,~]*(?:boletines|bulletins|meses|months)\b'
    in: [deliverable, web]
    reason: 'la cobertura de boletines (296) crece con cada boletín; toda mención ratio debe seguirla'
  - fact: n_months
    label: '(?:los|the)\s+([0-9]{3})\s+(?:boletines|bulletins)\b'
    in: [deliverable, web]
    reason: 'menciones sueltas "los 296 boletines" del censo'
  - fact: pct_frozen
    label: '\$([0-9]{2})\$\\,\\% de los meses'
    in: [deliverable]
    reason: 'el % de congelamiento del panel cambia con cada boletín'
  - fact: n_retro_events
    label: '([0-9]{3})\s+(?:historical\s+)?(?:retrogresiones|retrogressions|episodios\s+de\s+retrogresi)'
    in: [deliverable, web]
    reason: 'el conteo de retrogresiones del panel cambia con cada boletín'
  # dv: el sustantivo es OBLIGATORIO (sin él, un AÑO "2003 ... Diversity" matcheaba)
  - fact: dv_n_rows
    label: '([0-9][.,{}\\\s]*[0-9]{3})\s*(?:observaciones|filas|rows|registros)[^0-9\n]{0,30}(?:sorteo|lottery|diversi)'
    in: [deliverable, web]
    reason: 'las filas del sorteo de diversidad crecen ~6 por boletín (forma ES)'
  - fact: dv_n_rows
    label: '([0-9][.,{}\\\s]*[0-9]{3})\s+Diversity\s+Visa'
    in: [web]
    reason: 'las filas del sorteo de diversidad (forma EN "1,647 Diversity Visa ... rows")'
  # Selección FE (AH5): el web cita "44 → 1" del catálogo; el .tex usa macros \feFact*.
  # Si una re-campaña cambia la selección, esta regla caza la prosa desalineada.
  - fact: fe_sel_in
    label: '([0-9]{2,3})(?:\s|&nbsp;)*(?:→|->|&rarr;|&#8594;)(?:\s|&nbsp;)*[0-9]{1,2}\b'
    in: [web]
    reason: 'el embudo de selección FRESH/mRMR (hoy 44 → 1) cambia con cada re-campaña'
  # Catálogo de modelos comparados (plan WEB AT4): "24 modelos" / "24-model comparison"
  # en la prosa del scorecard web y del deliverable debe seguir a key_facts.n_models.
  - fact: n_models
    label: '([0-9]{2})[-\s]+(?:modelos\b|models\b|model comparison)'
    in: [deliverable, paper, web, governance]
    reason: 'el tamaño del catálogo comparado cambia con cada re-campaña (21→24); el model card lo publica y el RAG lo cita'
  # obs ENTRENABLES (estado F): "15,758 obs entrenables" / "... entrenables"
  # (audit EDA 3-jul, W-H2): el lado EN ("15,931 trainable obs") esquivaba el patrón
  # solo-español — la reincidencia exacta del hallazgo del audit dúo de junio.
  - fact: n_obs_F
    label: '([0-9]{2}[.,{}\\\s]*[0-9]{3})\s*~?(?:(?:obs\s*)?entrenabl|trainable\s*(?:obs|observation))'
    in: [deliverable, paper, readmes, web]
    reason: 'conteo de observaciones entrenables (estado F)'

# Claims MASE del deliverable/paper (audit 3-jul-2026): antes de esto el guardián solo
# comparaba enteros y la prosa de resultados quedaba sin vigilar — "empata/0.225" vivieron
# dos generaciones. Cada label captura UN número decimal en un contexto inequívoco.
decimal:
  # censo EDA: la fracción de retrogresiones citada en el deliverable
  - fact: pct_retro
    label: '\$([0-9]\.[0-9])\$\\,\\% de los avances'
    in: [deliverable]
    reason: 'el % de retrogresiones del panel cambia con cada boletín'
  # "listón parsimonioso ($0.114$)" — toda mención puntual del listón hold = ETS FAD
  - fact: ets_fad_mean
    label: 'listón parsimonioso \(\$([0-9.]+)\$\)'
    in: [deliverable]
    reason: 'el listón parsimonioso citado en prosa es el hold-out FAD de ETS'
  # AutoBiTCN <±60 chars> número — cubre prosa ("a MASE $=0.121$", "promedia $0.121$"),
  # la fila de tab:global_deep y el paper ("reaches mean MASE $0.121$").
  # AH1: el gap EXCLUYE backslash para no saltar por encima de una macro y el
  # ancla lleva \b — con IGNORECASE, "AutoBiTCN" matcheaba DENTRO del nombre de
  # la macro \factAutobitcnFadMean y capturaba el ±stddev de al lado.
  - fact: autobitcn_fad_mean
    label: '\bAutoBiTCN\b[^0-9\n\\]{0,60}?\$?=?\$?~?([0-9]\.[0-9]{3})'
    in: [deliverable, paper]
    reason: 'AutoBiTCN FAD multi-semilla (el claim que dejó de ser "empate")'
  # BiTCN (no Auto) seguido de MASE — el claim insignia de DFF
  - fact: bitcn_dff_mean
    label: '(?<!Auto)BiTCN[^0-9\n]{0,30}?MASE[\s~\$=]{0,4}\\?(?:textbf\{)?([0-9]\.[0-9]{2,3})'
    in: [deliverable, paper]
    reason: 'BiTCN DFF multi-semilla (0.090): todo "BiTCN ... MASE x" debe ser esa cifra'
  # naïve-1 (re-campaña AQ): el piso citado en prosa debe seguir a key_facts.
  # Labels anclados a la fraseología "$x$ en/on FAD|DFF" cerca de "naïve-1".
  - fact: naive1_fad_mean
    label: 'na[iï]ve-?1[^0-9\n\\]{0,100}?\$([0-9]\.[0-9]{2,3})\$ (en|on)( family)? FAD'
    in: [deliverable, paper]
    reason: 'el piso naïve-1 en FAD (hold-out medio) citado en prosa debe igualar key_facts'
  - fact: naive1_dff_mean
    label: 'na[iï]ve-?1[^0-9\n\\]{0,160}?\$([0-9]\.[0-9]{2,3})\$ (en|on) DFF'
    in: [deliverable, paper]
    reason: 'el piso naïve-1 en DFF (hold-out medio) citado en prosa debe igualar key_facts'
