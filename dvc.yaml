# Pipeline reproducible como DAG. `dvc repro` reconstruye TODA la cadena de datos
# abiertos + la fuente de verdad de cifras, en orden y solo lo que cambió, de forma
# determinista. La raíz es data/snapshots/ (HTML congelado, parseo OFFLINE) — la única
# fetch en vivo es pipeline/freeze_snapshots.py (red), que queda FUERA del DAG a propósito.
#
# Política (ver docs/DVC.md): los artefactos abiertos (CSV/JSON/key_facts) llevan
# `cache: false` -> se quedan versionados en git (siguen siendo el entregable
# descargable sin DVC). Los binarios derivados (duckdb/parquet) van a la cache DVC -> S3.
#
# C2 (plan auditoría 2026-07-11): los cmd usan `python` PORTABLE — se resuelve del
# entorno activo, no de un venv con nombre local. Correr DENTRO del entorno del
# proyecto: `make repro` (envuelve el dvc del venv) o `source ante/bin/activate &&
# dvc repro`. Los stages eda_facts/fe_facts requieren el extra `.[model]`.
#
# Frontera DAG-determinista vs runner-transaccional (C1; detalle en docs/DVC.md):
# aquí SOLO derivaciones puras y byte-deterministas de insumos versionados. Quedan
# FUERA a propósito: los LEDGERS (estado append-only: reproducir jamás reescribe
# evidencia), el manifiesto de release (hashea ese estado y lleva generated_at),
# forecasts/scoring (congelan estado vía el cron), figuras/galerías/PDFs (timestamps
# embebidos + extra de modelado) y el .duckdb (binario no byte-determinista — audit).

stages:
  scrape:
    desc: Parsea los snapshots HTML congelados OFFLINE -> 11 CSV por país (empleo+familiar+DV)
    cmd: python -m pipeline.scrape_all
    deps:
      - pipeline/scrape_all.py
      - vp_data/visa_common.py
      - pipeline/scrape_visa_bulletins.py
      - pipeline/scrape_family_visa_bulletins.py
      - pipeline/scrape_dv_visa_bulletins.py
      - data/snapshots
    outs:
      - data/raw:
          cache: false

  panel:
    desc: Consolida los CSV por país en el panel largo y_{p,c,b,t}
    cmd: python -m pipeline.build_panel
    deps:
      - pipeline/build_panel.py
      - vp_data/cleaning.py
      - data/raw
    outs:
      - data/processed/visa_panel_long.csv:
          cache: false
      # AA2: ledger de limpieza por build (determinista: sin reloj, clave = vintage)
      - reports/governance/cleaning_ledger.json:
          cache: false

  bulletins:
    desc: Feed compacto del último boletín que consume el sitio
    cmd: python -m pipeline.build_bulletins_json
    deps:
      - pipeline/build_bulletins_json.py
      - data/processed/visa_panel_long.csv
    outs:
      - data/processed/bulletins.json:
          cache: false

  database:
    desc: Carga el almacén estrella DuckDB + export Parquet (Parquet -> cache DVC/S3)
    cmd: python -m pipeline.build_database
    deps:
      - pipeline/build_database.py
      - schema.sql
      - vp_data/config.py
      - data/processed/visa_panel_long.csv
      - data/raw
    # El .duckdb NO se declara como out: el archivo DuckDB embebe orden interno/timestamps y
    # NO es byte-determinista, así que rastrearlo hacía que `dvc repro` nunca quedara limpio y
    # re-empujaba un binario distinto a S3 cada corrida (hallazgo del audit dúo). Es un efecto
    # secundario del cmd, gitignored y reconstruible. El Parquet SÍ es determinista -> es el
    # único binario versionado en la cache DVC.
    outs:
      - data/processed/visa_panel_long.parquet

  key_facts:
    desc: Fuente ÚNICA de verdad de las cifras (la consume el guardián de consistencia)
    cmd: python experiments/build_key_facts.py
    deps:
      - experiments/build_key_facts.py
      - vp_model/config.py
      - data/processed/visa_panel_long.csv
      - reports/prospective/forecast_scorecard_meta.json
      # H2: el namespace "prospective" de la vista v2 lee los pares live del gate A4.
      - reports/governance/promotion_decision.json
      # A-04 (auditoria ciega 11-jul): dep NO declarada — las macros champion/CRPS se
      # derivan de este artefacto; sin declararlo, regenerar el veredicto no forzaba
      # la re-derivacion de key_facts.
      - reports/governance/champion_challenger.json
      - reports/eval/auto_arima_baseline.csv
      - reports/eval/significance_summary.json
      - reports/eval/tuned_params.json
      # SOLO los insumos canónicos (no el dir completo: las corridas exploratorias
      # que caen en reports/campaign no deben churnear el lock — mordió 2 veces el 3-jul)
      - reports/campaign/campaign_pool_FAD_family.csv
      - reports/campaign/campaign_pool_DFF_family.csv
      - reports/campaign/global_DFF_camp_diff_s1.csv
      - reports/campaign/global_DFF_camp_diff_s2.csv
      - reports/campaign/global_DFF_camp_diff_s3.csv
      - reports/campaign/global_DFF_camp_diff_s4.csv
      - reports/campaign/global_DFF_camp_diff_s5.csv
      - reports/campaign/global_FAD_camp_auto_s1.csv
      - reports/campaign/global_FAD_camp_auto_s2.csv
      - reports/campaign/global_FAD_camp_auto_s3.csv
      - reports/campaign/global_FAD_camp_auto_s4.csv
      - reports/campaign/global_FAD_camp_auto_s5.csv
    outs:
      - reports/governance/key_facts.json:
          cache: false
      - reports/latex/key_facts.tex:
          cache: false

  # C1: censo EDA como stage (byte-determinista, verificado por doble corrida; lee el
  # panel CSV directo, no el .duckdb). Necesita `.[model]` (statsmodels): el cron 4g
  # lo regenera y hace `dvc commit`; el gate E2 de CI lo vigila (deps presentes en git).
  eda_facts:
    desc: Censo estadístico EDA (194 series + tests de estacionariedad sobre evaluables)
    cmd: python experiments/build_eda_facts.py
    deps:
      - experiments/build_eda_facts.py
      - vp_model/eda.py
      - vp_model/dataset.py
      - data/processed/visa_panel_long.csv
    outs:
      - reports/eda/eda_facts.json:
          cache: false

  # C1: catálogo FE como stage (byte-determinista; emite el JSON del web y las macros
  # del .tex). Mismas condiciones de entorno y cron que eda_facts.
  fe_facts:
    desc: Catálogo FE (decisiones cleaning+FE, selección FRESH/mRMR, macros del .tex)
    cmd: python experiments/build_fe_facts.py
    deps:
      - experiments/build_fe_facts.py
      - vp_model/feature_builder.py
      - vp_model/feature_select.py
      - vp_model/series_characterization.py
      - vp_data/cleaning.py
      - data/processed/visa_panel_long.csv
    outs:
      - reports/fe/fe_facts.json:
          cache: false
      - reports/latex/fe_facts.tex:
          cache: false
