name: Freeze new bulletin and rebuild

# The monthly Visa Bulletins are FIXED once published, so there is no reason to
# re-scrape all ~290 every day. This job is S3-driven: it pulls the frozen HTML
# from S3, fetches ONLY a newly published month (freeze_snapshots.py,
# skip-if-exists), and rebuilds the CSVs/panel/DuckDB **only when something new
# arrived**. On a day with no new bulletin it is a cheap no-op. Runs Mon-Fri at
# 12:00 PM America/New_York year-round (DST-safe, see the gate job below).

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC and ignores DST, so we fire at BOTH UTC times that map
    # to noon America/New_York and let the gate job below let exactly one
    # through: 16:00 UTC = 12:00 EDT (summer), 17:00 UTC = 12:00 EST (winter).
    - cron: '0 16 * * 1-5'  # noon ET while daylight saving (Mar-Nov), Mon-Fri
    - cron: '0 17 * * 1-5'  # noon ET while standard time (Nov-Mar), Mon-Fri

# F4: permisos mínimos por job — el gate no necesita nada; solo `update` escribe.
permissions: {}

# A5: nunca dos corridas simultáneas (la ventana freeze→push dura 15-30+ min con torch;
# un run manual encima de un cron era una carrera con push rechazado → activaba A3).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # DST-safe gate: only proceed when it is actually 12:00 in New York (so the
  # off-season trigger is dropped). Manual runs always pass.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
    - id: check
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
        fi
        # A5: aceptar 12 Y 13 — los crons de GitHub se retrasan rutinariamente y el
        # gate exacto (h==12) dejaba días SIN corrida ni heartbeat. Costo: en verano
        # ambos disparos pasan (12:xx y 13:xx) → una segunda corrida no-op barata,
        # serializada por el bloque `concurrency` e idempotente por skip-if-exists.
        h=$(TZ=America/New_York date +%H)
        if [ "$h" = "12" ] || [ "$h" = "13" ]; then
          echo "proceed=true" >> "$GITHUB_OUTPUT"
        else
          echo "proceed=false" >> "$GITHUB_OUTPUT"
          echo "Son las ${h}:00 en Nueva York, no mediodía -- se omite este disparo."
        fi

  update:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # commit + push del panel refrescado
      issues: write    # abrir/append del issue de fallo
      id-token: write  # F2: token OIDC para asumir el role (sin keys estáticas)
      actions: write   # L2: disparar ci.yml sobre el commit de datos (workflow_dispatch)

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
      with:
        python-version: '3.14'   # match the dev environment (pandas 3.x) for reproducibility

    - name: Install runtime dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .   # runtime deps from pyproject (single source of truth)

    - name: Configure AWS credentials
      # F2: OIDC role de corta vida con política mínima (Put/Get/List + ses:SendEmail,
      # SIN DeleteObject) en lugar de access keys estáticas con s3:*Object — un repo
      # comprometido ya no puede destruir el archivo S3 (la fuente de verdad).
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
      with:
        role-to-assume: arn:aws:iam::564141855321:role/gh-actions-visapredict
        role-session-name: freeze-and-rebuild
        aws-region: us-east-1

    - name: Freeze a newly published bulletin, then rebuild only if one arrived
      id: run
      run: |
        set -eo pipefail

        # The frozen HTML in S3 is the source of truth. Pull it down so
        # freeze's skip-if-exists fetches ONLY a month not already frozen.
        aws s3 sync s3://visapredictai-raw-snapshots/raw-html/ data/snapshots/ --quiet
        python freeze_snapshots.py > /tmp/new_count   # crashes fail the step under set -e
        # A5: robusto a stdout espurio (un warning de una dep rompía el [ "$new" = "0" ])
        new=$(tail -1 /tmp/new_count)
        [[ "$new" =~ ^[0-9]+$ ]] || { echo "::error::conteo de freeze no numérico: '$new'"; exit 1; }
        echo "new=$new" >> "$GITHUB_OUTPUT"   # surfaced to the email step below

        # A3: rebuild when a month was JUST frozen *or* when a previously frozen
        # month never made it into the committed panel (self-healing: a run that
        # died mid-rebuild used to leave `new=0` forever and the job green).
        stale=$(python tools/check_ingestion.py --mode pending)
        if [ "$new" = "0" ] && [ "$stale" = "fresh" ]; then
          echo "No new bulletin and panel up to date -- nothing to rebuild."
          exit 0
        fi
        echo "$new new bulletin(s) frozen (panel: $stale) -- rebuilding."

        # 1. Rebuild CSVs/panel/DuckDB OFFLINE from the frozen snapshots.
        #    (The S3 backup sync moved to AFTER the commit: pushing unvalidated
        #    HTML first left a poisoned/never-ingested month frozen forever.)
        pip install -e ".[dev]"        # duckdb + pytest for the DB rebuild/gate
        python scrape_all.py           # parse snapshots -> per-country CSVs (no network)
        python build_panel.py          # -> data/processed/visa_panel_long.csv
        python build_bulletins_json.py # -> data/processed/bulletins.json (website news feed)

        # 2. Quality gate -- nothing is committed unless these pass.
        python tests/test_parsers.py
        python tests/test_extraction.py
        python tests/test_panel_integrity.py
        # A2: the frozen month MUST be in the rebuilt panel. Without this a new
        # bulletin that parses to 0 rows ended as "nothing to commit" + green job.
        python tools/check_ingestion.py --mode assert

        # 3. Refresh the DuckDB star schema and validate it accepts the new data
        #    (the .duckdb/.parquet stay gitignored -- regenerable with `make db`).
        python build_database.py
        # --cov-fail-under=0: this targeted DB-contract run doesn't import the
        # scraper modules, so the global 65% coverage gate (pyproject) would
        # spuriously fail it. The plain-script gate above already covers those.
        python -m pytest tests/test_database.py --cov-fail-under=0

        # 4b. Regenerate the web demonstrator's production-model forecasts. Needs
        #     the modeling deps; install CPU-only torch first so .[model] doesn't
        #     pull the ~2 GB CUDA wheel. Produces reports/web_forecasts.csv (+meta)
        #     — per-series 12-month forecasts (FAD: median Theta+ETS+SARIMA;
        #     DFF: SARIMA; split-conformal 80/95% bands). The website fetches these
        #     at build time. Per-series MASE/coverage land in the committed meta.json.
        pip install torch==2.12.0 --index-url https://download.pytorch.org/whl/cpu
        pip install -e ".[model]"
        python experiments/generate_web_forecasts.py

        # 4c. Prospective scoring: now that this month's REAL cutoffs are in the
        #     panel, grade every previously-frozen forecast whose target month just
        #     landed (forecast_log.csv vs actuals) → reports/forecast_scorecard*.
        #     This is the real-world 12-month accuracy, accruing one month at a time.
        python experiments/score_forecasts.py

        # 4d. Refresh the single source of truth (reports/key_facts.json) from the new
        #     data + scorecard, so the consistency guard (CI) keeps the prose honest.
        python experiments/build_key_facts.py

        # 4e. Regenerate the auto-derived model card (numbers from key_facts + lineage stamp)
        #     so it never drifts from the source of truth.
        python experiments/build_model_card.py

        # 4f. ML drift monitor: performance/coverage on the prospective ledger + data drift in
        #     the new bulletin. Not a gate (never fails the step); its summary is surfaced in the
        #     SES email below so a human reviews any flagged movement.
        python experiments/check_drift.py | tee /tmp/drift.txt || true

        # 5. L1: refresh dvc.lock for the three git-only stages whose deps/outs this
        #    run just regenerated. Without this, the CI gate (`dvc status panel
        #    bulletins key_facts`) turns red on the NEXT human push, weeks after the
        #    cause. `dvc commit` records current hashes without re-running anything.
        pip install "dvc==3.67.1"   # same pin as ci.yml
        dvc commit --force scrape panel bulletins key_facts

        # 6. Commit the refreshed CSVs/panel/forecasts/scorecard/key_facts (snapshots + DB gitignored).
        git config --local user.email "168046724+jrebull@users.noreply.github.com"
        git config --local user.name "Javier Rebull"
        # A5: pathspecs explícitos — `git add -A` tras instalar torch y correr 5 scripts
        # podía colar cualquier artefacto suelto no-gitignored al repo de historia limpia.
        git add data/raw data/processed reports dvc.lock
        if git diff --cached --quiet; then
          echo "New HTML frozen but parsed data unchanged -- nothing to commit."
        else
          git commit -m "Add bulletin $(date -u +%Y-%m): refresh panel from frozen HTML"
          git pull --rebase origin main   # A5: un push a main durante los ~20 min de corrida ya no tumba el job
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
        fi

        # L2: los pushes hechos con GITHUB_TOKEN NO disparan CI (anti-recursión de
        # GitHub), así que el commit de datos más importante del mes escapaba al
        # guardián de consistencia. Correrlo AQUÍ y surfacearlo en el correo SES:
        # el drift mensual de n_obs (regla #0) debe verse el día que ocurre, no
        # semanas después en el push humano siguiente. No es gate (|| true): que
        # la prosa quede desfasada del dato nuevo es esperado; lo grave es no verlo.
        python tools/check_consistency.py > /tmp/consistency.txt 2>&1 || true
        tail -5 /tmp/consistency.txt

        # 7. ONLY NOW back the validated raw HTML up to S3 (A3). If anything above
        #    failed, nothing was synced: the next run re-fetches the month from the
        #    live site (bulletins stay published for months) and retries everything.
        aws s3 sync data/snapshots/ s3://visapredictai-raw-snapshots/raw-html/

    - name: "Run CI on the data commit (GITHUB_TOKEN pushes never fire on-push)"
      # L2 (ideal): la mitad "correr CI de verdad". workflow_dispatch es la excepción
      # documentada a la regla anti-recursión, así que este disparo SÍ crea el run.
      if: steps.run.outputs.pushed == 'true'
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh workflow run ci.yml --ref main || echo "::warning::no se pudo disparar CI sobre el commit de datos"

    - name: Redeploy the website on a new bulletin (Netlify build hook)
      # Only when a bulletin actually arrived. The web build re-fetches the panel
      # + forecasts from this repo, so a redeploy ships the fresh data.
      if: steps.run.outputs.new != '0' && steps.run.outputs.new != ''
      env:
        HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
      run: |
        if [ -n "$HOOK" ]; then
          curl -fsS -X POST -d '{}' "$HOOK" && echo "Redeploy del sitio disparado (Netlify)."
        else
          echo "::warning::NETLIFY_BUILD_HOOK no configurado -- el sitio no se redesplegará solo."
          echo "Crea un Build hook en Netlify (Site settings -> Build & deploy -> Build hooks)"
          echo "y agrégalo como secret del repo: NETLIFY_BUILD_HOOK."
        fi

    - name: Email heartbeat via SES (every run -- no-op, new bulletin, or failure)
      if: always()
      env:
        JOB_STATUS: ${{ job.status }}
        NEW: ${{ steps.run.outputs.new || 'n/d (el job no llegó al conteo)' }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # Reuses the AWS creds already configured above. The IAM user needs
        # ses:SendEmail. From is noreply@visapredictai.com (DKIM-verified domain
        # we control) so it passes the recipient's SPF/DMARC -- sending From the
        # uacj address via SES was hard-failing Microsoft 365's SPF and getting
        # dropped. In sandbox the To (al263483@...) stays a verified identity.
        #
        # One-line ML drift status from the monitor (reports/drift_report.json), surfaced so a
        # human reviews any flagged bulletin movement. python is already on PATH in this job.
        DRIFT_LINE="n/d (sin reporte este run)"
        if [ -f reports/drift_report.json ]; then
          DRIFT_LINE=$(python -c "import json;d=json.load(open('reports/drift_report.json'));p=d.get('performance',{});n=len(d.get('data',{}).get('flagged',[]));s='DRIFT DETECTADO' if d.get('drift_detected') else 'sin novedad';print(s+' -- desempeno x'+str(p.get('perf_ratio','?'))+', '+str(n)+' serie(s) con movimiento sin precedente')")
        fi
        # L2: veredicto del guardián de consistencia (regla #0) sobre el dato recién
        # comiteado — el push del cron no dispara CI, así que este correo es donde
        # el humano ve el drift n_obs↔prosa el día que ocurre.
        CONS_LINE="n/d (sin corrida este run)"
        if [ -f /tmp/consistency.txt ]; then
          # tr: sin comillas/backslashes que rompan el JSON del heredoc de SES
          CONS_LINE=$(tail -1 /tmp/consistency.txt | tr -d '"\\')
        fi
        cat > /tmp/ses.json <<JSON
        {
          "FromEmailAddress": "VisaPredict CI <noreply@visapredictai.com>",
          "Destination": {"ToAddresses": ["al263483@alumnos.uacj.mx"]},
          "Content": {"Simple": {
            "Subject": {"Data": "VisaPredict | corrida $JOB_STATUS — $NEW boletín(es) nuevo(s)"},
            "Body": {"Text": {"Data": "El proceso de actualización corrió.\nResultado del job: $JOB_STATUS\nBoletines nuevos congelados este run: $NEW\nDrift ML: $DRIFT_LINE\nConsistencia (regla #0): $CONS_LINE\nLogs: $RUN_URL"}}
          }}
        }
        JSON
        aws sesv2 send-email --region us-east-1 --cli-input-json file:///tmp/ses.json

    - name: Alert on failure (open or append a tracking issue)
      if: failure()
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
      with:
        script: |
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = `The scheduled **Freeze new bulletin and rebuild** run failed (gate red, fetch error, or crash).\nLogs: ${runUrl}`;
          const { data: open } = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo,
            labels: 'scrape-failure', state: 'open',
          });
          if (open.length) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: open[0].number, body,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'Daily Visa Bulletin scrape is failing', body,
              labels: ['scrape-failure'],
            });
          }
