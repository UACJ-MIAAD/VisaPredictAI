name: Freeze new bulletin and rebuild

# The monthly Visa Bulletins are FIXED once published, so there is no reason to
# re-scrape all ~290 every day. This job is S3-driven: it pulls the frozen HTML
# from S3, fetches ONLY a newly published month (freeze_snapshots.py,
# skip-if-exists), and rebuilds the CSVs/panel/DuckDB **only when something new
# arrived**. On a day with no new bulletin it is a cheap no-op. Runs Mon-Fri at
# 12:00 PM America/New_York year-round (DST-safe, see the gate job below).

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC and ignores DST, so we fire at BOTH UTC times that map
    # to noon America/New_York and let the gate job below let exactly one
    # through: 16:00 UTC = 12:00 EDT (summer), 17:00 UTC = 12:00 EST (winter).
    - cron: '0 16 * * 1-5'  # noon ET while daylight saving (Mar-Nov), Mon-Fri
    - cron: '0 17 * * 1-5'  # noon ET while standard time (Nov-Mar), Mon-Fri

permissions:
  contents: write
  issues: write   # to open/append a failure-alert issue

jobs:
  # DST-safe gate: only proceed when it is actually 12:00 in New York (so the
  # off-season trigger is dropped). Manual runs always pass.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
    - id: check
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
        fi
        h=$(TZ=America/New_York date +%H)
        if [ "$h" = "12" ]; then
          echo "proceed=true" >> "$GITHUB_OUTPUT"
        else
          echo "proceed=false" >> "$GITHUB_OUTPUT"
          echo "Son las ${h}:00 en Nueva York, no mediodía -- se omite este disparo."
        fi

  update:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'   # match the dev environment (pandas 3.x) for reproducibility

    - name: Install runtime dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .   # runtime deps from pyproject (single source of truth)

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Freeze a newly published bulletin, then rebuild only if one arrived
      id: run
      run: |
        set -eo pipefail

        # The frozen HTML in S3 is the source of truth. Pull it down so
        # freeze's skip-if-exists fetches ONLY a month not already frozen.
        aws s3 sync s3://visapredictai-raw-snapshots/raw-html/ data/snapshots/ --quiet
        python freeze_snapshots.py > /tmp/new_count   # crashes fail the step under set -e
        new=$(cat /tmp/new_count)
        echo "new=$new" >> "$GITHUB_OUTPUT"   # surfaced to the email step below

        if [ "$new" = "0" ]; then
          echo "No new bulletin this run -- nothing to rebuild."
          exit 0
        fi
        echo "$new new bulletin(s) frozen -- backing up and rebuilding."

        # 1. Push the new raw HTML to S3 (immutable backup).
        aws s3 sync data/snapshots/ s3://visapredictai-raw-snapshots/raw-html/

        # 2. Rebuild CSVs/panel/DuckDB OFFLINE from the frozen snapshots.
        pip install -e ".[dev]"        # duckdb + pytest for the DB rebuild/gate
        python scrape_all.py           # parse snapshots -> per-country CSVs (no network)
        python build_panel.py          # -> data/processed/visa_panel_long.csv
        python build_bulletins_json.py # -> data/processed/bulletins.json (website news feed)

        # 3. Quality gate -- nothing is committed unless these pass.
        python tests/test_parsers.py
        python tests/test_extraction.py
        python tests/test_panel_integrity.py

        # 4. Refresh the DuckDB star schema and validate it accepts the new data
        #    (the .duckdb/.parquet stay gitignored -- regenerable with `make db`).
        python build_database.py
        # --cov-fail-under=0: this targeted DB-contract run doesn't import the
        # scraper modules, so the global 65% coverage gate (pyproject) would
        # spuriously fail it. The plain-script gate above already covers those.
        python -m pytest tests/test_database.py --cov-fail-under=0

        # 4b. Regenerate the web demonstrator's production-model forecasts. Needs
        #     the modeling deps; install CPU-only torch first so .[model] doesn't
        #     pull the ~2 GB CUDA wheel. Produces reports/web_forecasts.csv (+meta)
        #     — per-series 12-month forecasts (FAD: median Theta+ETS+SARIMA;
        #     DFF: SARIMA; split-conformal 80/95% bands). The website fetches these
        #     at build time. Per-series MASE/coverage land in the committed meta.json.
        pip install torch==2.12.0 --index-url https://download.pytorch.org/whl/cpu
        pip install -e ".[model]"
        python experiments/generate_web_forecasts.py

        # 4c. Prospective scoring: now that this month's REAL cutoffs are in the
        #     panel, grade every previously-frozen forecast whose target month just
        #     landed (forecast_log.csv vs actuals) → reports/forecast_scorecard*.
        #     This is the real-world 12-month accuracy, accruing one month at a time.
        python experiments/score_forecasts.py

        # 5. Commit the refreshed CSVs/panel/forecasts/scorecard (snapshots + DB gitignored).
        git config --local user.email "168046724+jrebull@users.noreply.github.com"
        git config --local user.name "Javier Rebull"
        git add -A
        if git diff --cached --quiet; then
          echo "New HTML frozen but parsed data unchanged -- nothing to commit."
        else
          git commit -m "Add bulletin $(date -u +%Y-%m): refresh panel from frozen HTML"
          git push
        fi

    - name: Redeploy the website on a new bulletin (Netlify build hook)
      # Only when a bulletin actually arrived. The web build re-fetches the panel
      # + forecasts from this repo, so a redeploy ships the fresh data.
      if: steps.run.outputs.new != '0' && steps.run.outputs.new != ''
      env:
        HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
      run: |
        if [ -n "$HOOK" ]; then
          curl -fsS -X POST -d '{}' "$HOOK" && echo "Redeploy del sitio disparado (Netlify)."
        else
          echo "::warning::NETLIFY_BUILD_HOOK no configurado -- el sitio no se redesplegará solo."
          echo "Crea un Build hook en Netlify (Site settings -> Build & deploy -> Build hooks)"
          echo "y agrégalo como secret del repo: NETLIFY_BUILD_HOOK."
        fi

    - name: Email heartbeat via SES (every run -- no-op, new bulletin, or failure)
      if: always()
      env:
        JOB_STATUS: ${{ job.status }}
        NEW: ${{ steps.run.outputs.new || 'n/d (el job no llegó al conteo)' }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # Reuses the AWS creds already configured above. The IAM user needs
        # ses:SendEmail. From is noreply@visapredictai.com (DKIM-verified domain
        # we control) so it passes the recipient's SPF/DMARC -- sending From the
        # uacj address via SES was hard-failing Microsoft 365's SPF and getting
        # dropped. In sandbox the To (al263483@...) stays a verified identity.
        cat > /tmp/ses.json <<JSON
        {
          "FromEmailAddress": "VisaPredict CI <noreply@visapredictai.com>",
          "Destination": {"ToAddresses": ["al263483@alumnos.uacj.mx"]},
          "Content": {"Simple": {
            "Subject": {"Data": "VisaPredict | corrida $JOB_STATUS — $NEW boletín(es) nuevo(s)"},
            "Body": {"Text": {"Data": "El proceso de actualización corrió.\nResultado del job: $JOB_STATUS\nBoletines nuevos congelados este run: $NEW\nLogs: $RUN_URL"}}
          }}
        }
        JSON
        aws sesv2 send-email --region us-east-1 --cli-input-json file:///tmp/ses.json

    - name: Alert on failure (open or append a tracking issue)
      if: failure()
      uses: actions/github-script@v8
      with:
        script: |
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = `The scheduled **Freeze new bulletin and rebuild** run failed (gate red, fetch error, or crash).\nLogs: ${runUrl}`;
          const { data: open } = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo,
            labels: 'scrape-failure', state: 'open',
          });
          if (open.length) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: open[0].number, body,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'Daily Visa Bulletin scrape is failing', body,
              labels: ['scrape-failure'],
            });
          }
