name: Freeze new bulletin and rebuild

# The monthly Visa Bulletins are FIXED once published, so there is no reason to
# re-scrape all ~290 every day. This job is S3-driven: it pulls the frozen HTML
# from S3, fetches ONLY a newly published month (pipeline/freeze_snapshots.py,
# skip-if-exists), and rebuilds the CSVs/panel/DuckDB **only when something new
# arrived**. On a day with no new bulletin it is a cheap no-op. Runs Mon-Fri at
# 12:00 PM America/New_York year-round (DST-safe, see the gate job below).

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC and ignores DST, so we fire at BOTH UTC times that map
    # to noon America/New_York and let the gate job below let exactly one
    # through: 16:00 UTC = 12:00 EDT (summer), 17:00 UTC = 12:00 EST (winter).
    - cron: '0 16 * * 1-5'  # noon ET while daylight saving (Mar-Nov), Mon-Fri
    - cron: '0 17 * * 1-5'  # noon ET while standard time (Nov-Mar), Mon-Fri

# F4: permisos mínimos por job — el gate no necesita nada; solo `update` escribe.
permissions: {}

# A5: nunca dos corridas simultáneas (la ventana freeze→push dura 15-30+ min con torch;
# un run manual encima de un cron era una carrera con push rechazado → activaba A3).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # DST-safe gate: only proceed when it is actually 12:00 in New York (so the
  # off-season trigger is dropped). Manual runs always pass.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
    - id: check
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "proceed=true" >> "$GITHUB_OUTPUT"; exit 0
        fi
        # A5: aceptar 12 Y 13 — los crons de GitHub se retrasan rutinariamente y el
        # gate exacto (h==12) dejaba días SIN corrida ni heartbeat. Costo: en verano
        # ambos disparos pasan (12:xx y 13:xx) → una segunda corrida no-op barata,
        # serializada por el bloque `concurrency` e idempotente por skip-if-exists.
        h=$(TZ=America/New_York date +%H)
        if [ "$h" = "12" ] || [ "$h" = "13" ]; then
          echo "proceed=true" >> "$GITHUB_OUTPUT"
        else
          echo "proceed=false" >> "$GITHUB_OUTPUT"
          echo "Son las ${h}:00 en Nueva York, no mediodía -- se omite este disparo."
        fi

  update:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # commit + push del panel refrescado
      issues: write    # abrir/append del issue de fallo
      id-token: write  # F2: token OIDC para asumir el role (sin keys estáticas)
      actions: write   # L2: disparar ci.yml sobre el commit de datos (workflow_dispatch)

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
      with:
        python-version: '3.14'   # match the dev environment (pandas 3.x) for reproducibility

    - name: Install runtime dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .   # runtime deps from pyproject (single source of truth)

    - name: Configure AWS credentials
      # F2: OIDC role de corta vida con política mínima (Put/Get/List + ses:SendEmail,
      # SIN DeleteObject) en lugar de access keys estáticas con s3:*Object — un repo
      # comprometido ya no puede destruir el archivo S3 (la fuente de verdad).
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
      with:
        role-to-assume: arn:aws:iam::564141855321:role/gh-actions-visapredict
        role-session-name: freeze-and-rebuild
        aws-region: us-east-1

    - name: Freeze a newly published bulletin, then rebuild only if one arrived
      id: run
      run: |
        set -eo pipefail

        # The frozen HTML in S3 is the source of truth. Pull it down so
        # freeze's skip-if-exists fetches ONLY a month not already frozen.
        aws s3 sync s3://visapredictai-raw-snapshots/raw-html/ data/snapshots/ --quiet
        python -m pipeline.freeze_snapshots > /tmp/new_count   # crashes fail the step under set -e
        # A5: robusto a stdout espurio (un warning de una dep rompía el [ "$new" = "0" ])
        new=$(tail -1 /tmp/new_count)
        [[ "$new" =~ ^[0-9]+$ ]] || { echo "::error::conteo de freeze no numérico: '$new'"; exit 1; }
        echo "new=$new" >> "$GITHUB_OUTPUT"   # surfaced to the email step below

        # A3: rebuild when a month was JUST frozen *or* when a previously frozen
        # month never made it into the committed panel (self-healing: a run that
        # died mid-rebuild used to leave `new=0` forever and the job green).
        stale=$(python tools/check_ingestion.py --mode pending)
        if [ "$new" = "0" ] && [ "$stale" = "fresh" ]; then
          # #17 (audit EDA 3-jul): datos al día, pero ¿y los artefactos derivados?
          # Un paso model/eda que moría TRAS publicar los datos dejaba key_facts/
          # eda_facts un mes atrás, y esta salida temprana los abandonaba hasta el
          # boletín siguiente. Si van detrás del panel, re-disparar SOLO el bloque
          # de modelado (rebuilt=true): sus commits de datos hacen no-op (diff
          # vacío) y el modelado exige el .duckdb (gitignored) fresco — construirlo
          # y validarlo aquí, igual que en la ruta de rebuild completo.
          model=$(python tools/check_ingestion.py --mode model-pending)
          if [ "$model" = "stale" ]; then
            echo "Panel al dia pero key_facts/eda_facts van detras -- re-lanzando el bloque de modelado."
            pip install -e ".[dev]"
            python -m pipeline.build_database
            python -m pytest tests/test_database.py --cov-fail-under=0
            echo "rebuilt=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "No new bulletin and panel up to date -- nothing to rebuild."
          exit 0
        fi
        echo "$new new bulletin(s) frozen (panel: $stale) -- rebuilding."
        # L4: the redeploy/model steps key on REBUILT, not on new>0 — the stale
        # self-healing path used to rebuild the panel but never redeploy the site,
        # leaving it a month behind exactly when publishing mattered most.
        echo "rebuilt=true" >> "$GITHUB_OUTPUT"

        # 1. Rebuild CSVs/panel/DuckDB OFFLINE from the frozen snapshots.
        #    (The S3 backup sync moved to AFTER the commit: pushing unvalidated
        #    HTML first left a poisoned/never-ingested month frozen forever.)
        pip install -e ".[dev]"        # duckdb + pytest for the DB rebuild/gate
        python -m pipeline.scrape_all           # parse snapshots -> per-country CSVs (no network)
        python -m pipeline.build_panel          # -> data/processed/visa_panel_long.csv
        python -m pipeline.build_bulletins_json # -> data/processed/bulletins.json (website news feed)

        # 2. Quality gate -- nothing is committed unless these pass.
        python tests/test_parsers.py
        python tests/test_extraction.py
        python tests/test_panel_integrity.py
        # A2: the frozen month MUST be in the rebuilt panel. Without this a new
        # bulletin that parses to 0 rows ended as "nothing to commit" + green job.
        python tools/check_ingestion.py --mode assert
        # K6: the 12-dimension audit has teeth (exit 1 on CRIT since E5) but only
        # `make audit` ran it — offline, seconds, and its two gravest dimensions
        # (unexplained missing months, source<->panel volume loss) are now CRIT.
        python -m pipeline.mega_audit

        # 3. Refresh the DuckDB star schema and validate it accepts the new data
        #    (the .duckdb/.parquet stay gitignored -- regenerable with `make db`).
        python -m pipeline.build_database
        # --cov-fail-under=0: this targeted DB-contract run doesn't import the
        # scraper modules, so the global 65% coverage gate (pyproject) would
        # spuriously fail it. The plain-script gate above already covers those.
        python -m pytest tests/test_database.py --cov-fail-under=0

        # 5. L1+L3: refresh dvc.lock for the DATA stages just regenerated and commit
        #    the validated panel NOW — before the ~2 GB torch install and the
        #    forecast scripts. A3's AC demanded this separation: a PyTorch-index
        #    outage or a forecast bug used to hold the already-validated bulletin
        #    (and its S3 backup) hostage indefinitely.
        pip install "dvc==3.67.1"   # same pin as ci.yml
        dvc commit --force scrape panel bulletins
        git config --local user.email "168046724+jrebull@users.noreply.github.com"
        git config --local user.name "Javier Rebull"
        # A5: pathspecs explícitos — nada de `git add -A` en el repo de historia limpia.
        git add data/raw data/processed dvc.lock
        if git diff --cached --quiet; then
          echo "New HTML frozen but parsed data unchanged -- nothing to commit."
        else
          # L7: name the month actually INGESTED (an August bulletin publishes
          # mid-July: date -u said 2026-07) and be honest on the self-heal path.
          mes=$(python -c "import pandas as pd; print(pd.to_datetime(pd.read_csv('data/processed/visa_panel_long.csv', usecols=['bulletin_date'])['bulletin_date']).max().strftime('%Y-%m'))")
          if [ "$new" = "0" ]; then
            git commit -m "Self-heal: reingest panel through $mes from frozen HTML"
          else
            git commit -m "Add bulletin $mes: refresh panel from frozen HTML"
          fi
          git pull --rebase origin main   # A5: un push a main durante los ~20 min de corrida ya no tumba el job
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
        fi

        # 6. Back the validated raw HTML up to S3 right after the data commit (A3/L3).
        #    If anything above failed, nothing was synced: the next run re-fetches the
        #    month from the live site and retries everything.
        aws s3 sync data/snapshots/ s3://visapredictai-raw-snapshots/raw-html/

    - name: Regenerate forecasts, scorecard and key facts (modeling block)
      id: model
      # L3: its failure opens the issue and skips the redeploy, but the bulletin
      # data above is already committed, pushed and backed up.
      if: steps.run.outputs.rebuilt == 'true'
      env:
        GH_TOKEN: ${{ github.token }}   # AO8: gh issue create for the re-campaign trigger
      run: |
        set -eo pipefail

        # 4b. Regenerate the web demonstrator's production-model forecasts. Needs
        #     the modeling deps; install CPU-only torch first so .[model] doesn't
        #     pull the ~2 GB CUDA wheel. Produces reports/prospective/web_forecasts.csv (+meta)
        #     — per-series 12-month forecasts (FAD: median Theta+ETS+SARIMA;
        #     DFF: SARIMA; split-conformal 80/95% bands). The website fetches these
        #     at build time. Per-series MASE/coverage land in the committed meta.json.
        pip install torch==2.12.0 --index-url https://download.pytorch.org/whl/cpu
        pip install -e ".[model]"
        python experiments/generate_web_forecasts.py

        # 4c. Prospective scoring: now that this month's REAL cutoffs are in the
        #     panel, grade every previously-frozen forecast whose target month just
        #     landed (forecast_log.csv vs actuals) → reports/prospective/forecast_scorecard*.
        #     A3: also scores the shadow ledger + emits the champion-vs-shadow head-to-head.
        python experiments/score_forecasts.py

        # 4c-bis (A4). Pre-registered prospective promotion gate: consumes both
        # scorecards and refreshes reports/governance/promotion_decision.json
        # (promote/retain/extend-shadow/reject per table). Advisory: the actual
        # promotion stays human (--promote refuses without a "promote" decision).
        python experiments/run_promotion_gate.py

        # 4d. Refresh the single source of truth (reports/governance/key_facts.json) from the new
        #     data + scorecard, so the consistency guard (CI) keeps the prose honest.
        python experiments/build_key_facts.py

        # 4e. Regenerate the auto-derived model card (numbers from key_facts + lineage stamp).
        python experiments/build_model_card.py

        # 4e-bis (AO6a). Refresh the champion-challenger verdict every bulletin so the
        # promotion recommendation never goes stale. NOT a gate (|| true): a failed
        # verdict must not hold this month's forecasts hostage. Its governance
        # artifacts (champion_challenger.{json,md}) ride the `git add reports` below.
        (python experiments/run_champion_challenger.py && echo "veredicto refrescado OK" > /tmp/champion.txt) \
          || echo "FALLO este run (veredicto del mes anterior sigue vigente; ver logs)" > /tmp/champion.txt

        # 4e-ter (AO6b). Shadow deployment: freeze the best challenger's vintage into
        # the SEPARATE immutable shadow ledger (forecast_log_shadow.csv) so the
        # promotion gate accumulates prospective evidence. Statistical re-fits only
        # (minutes); non-blocking like the verdict itself.
        (python experiments/freeze_shadow.py && echo "anada del retador congelada OK" > /tmp/shadow.txt) \
          || echo "FALLO este run (sin evidencia sombra nueva este mes; ver logs)" > /tmp/shadow.txt

        # 4f. ML drift monitor — not a gate; its summary goes in the SES email below.
        python experiments/check_drift.py | tee /tmp/drift.txt || true

        # 4f-bis (AO8). Re-campaign trigger, HUMAN-GATED: if performance drift has held
        # for 3 consecutive vintages (drift_history.jsonl), open ONE tracking issue.
        # It never launches a campaign — a human decides. Duplicate-guarded by title.
        if python -c "import json,sys; r=json.load(open('reports/governance/drift_report.json')); sys.exit(0 if r.get('performance',{}).get('recampaign_due') else 1)"; then
          title="re-campaign due: performance drift on 3+ consecutive vintages"
          if [ -z "$(gh issue list --state open --search "re-campaign due in:title" --json number --jq '.[0].number // empty')" ]; then
            gh issue create --title "$title" \
              --body "The drift monitor flagged performance_drift on 3+ consecutive vintages (see reports/governance/drift_history.jsonl and drift_report.json). A re-derivation campaign is DUE but must be launched by a human (rule: never auto-run campaigns)." \
              || echo "::warning::could not open the re-campaign issue"
          else
            echo "re-campaign issue already open -- not duplicating."
          fi
        fi

        # L1: key_facts.json just changed — keep its DVC stage fresh too.
        # (M2 audit 3-jul: el pip install -e ".[model]" de arriba re-resuelve deps y
        # puede desplazar las de dvc; re-pinnear es idempotente y tarda segundos.)
        pip install "dvc==3.67.1" --quiet
        dvc commit --force key_facts
        # La identidad git del paso `run` solo se escribe en su sección de commit de
        # datos, que la ruta self-heal (#17) salta con exit 0 — sin estas líneas el
        # primer commit de este paso moría con "empty ident" (cazado en el estreno).
        git config --local user.email "168046724+jrebull@users.noreply.github.com"
        git config --local user.name "Javier Rebull"
        git add reports dvc.lock
        if git diff --cached --quiet; then
          echo "Forecasts/key facts unchanged -- nothing to commit."
        else
          git commit -m "Update forecasts, scorecard and key facts"
          git pull --rebase origin main
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
        fi

        # L2: los pushes hechos con GITHUB_TOKEN NO disparan CI (anti-recursión de
        # GitHub), así que el commit de datos más importante del mes escapaba al
        # guardián de consistencia. Correrlo AQUÍ y surfacearlo en el correo SES:
        # el drift mensual de n_obs (regla #0) debe verse el día que ocurre. No es
        # gate (|| true): que la prosa quede desfasada del dato nuevo es esperado;
        # lo grave es no verlo.
        python tools/check_consistency.py > /tmp/consistency.txt 2>&1 || true
        tail -5 /tmp/consistency.txt

    - name: EDA + FE vivos (censo + catálogo + figuras + reportes) — commit propio, no bloquea forecasts
      id: eda
      # 4g (plan EDA brutal, reestructurado tras el audit 3-jul H1; épica AF ext.): corre
      # DESPUÉS del commit de modelado para que un fallo aquí no cancele la publicación del
      # mes de forecasts/key_facts. continue-on-error: el redeploy de Netlify no depende de
      # EDA/FE; el correo SES reporta el fallo (markers /tmp/eda.txt + /tmp/fe.txt) y el
      # humano decide. El bloque es todo-o-nada: un fallo NO comitea artefactos parciales.
      if: steps.run.outputs.rebuilt == 'true'
      continue-on-error: true
      run: |
        set -eo pipefail
        run_eda() {
          # Sus gates internos (C2) abortan si el censo o la galería salen mutilados.
          # vp_model.plots ahora escribe TAMBIÉN a reports/latex/Figures (audit H2):
          # sin eso, el .tex mezclaba figuras eda2/eda3 frescas con eda_* congeladas.
          python experiments/build_eda_facts.py
          python -m vp_model.plots
          python experiments/make_eda_figures.py
          python experiments/make_gallery_figures.py
          python experiments/build_eda_report.py
          python tests/test_eda_facts.py
          python tests/test_eda_report.py
          # FE vivo (AF): catálogo fe_facts + galería f01-f07 (4 variantes) + reporte
          # bilingüe; su test valida stats embebidos vs fe_facts y la galería 4x7.
          python experiments/build_fe_facts.py
          python experiments/make_fe_figures.py
          python experiments/build_fe_report.py
          python tests/test_fe_report.py
        }
        if ! run_eda; then
          echo "EDA vivo: FALLÓ este run (artefactos del mes anterior siguen publicados; ver logs)" > /tmp/eda.txt
          echo "FE vivo: FALLÓ este run (bloque EDA+FE todo-o-nada; ver logs)" > /tmp/fe.txt
          exit 1
        fi
        python -c "import json;f=json.load(open('reports/eda/eda_facts.json'));p=f['panel'];print(f\"EDA {f['vintage']}: {p['n_series_structural']} series censadas, {p['n_series_evaluable']} evaluables, reporte OK\")" > /tmp/eda.txt
        python -c "import json;f=json.load(open('reports/fe/fe_facts.json'));fs=f['feature_selection'];print(f\"FE {f['vintage']}: {len(f['fe_decisions'])}+{len(f['cleaning_decisions'])} decisiones, selección {fs['n_features_in']}->{fs['n_selected']}, reportes ES+EN OK\")" > /tmp/fe.txt
        # Identidad propia: en la ruta self-heal ningún paso previo la configura.
        git config --local user.email "168046724+jrebull@users.noreply.github.com"
        git config --local user.name "Javier Rebull"
        git add reports
        if git diff --cached --quiet; then
          echo "EDA/FE sin cambios -- nada que comitear."
        else
          git commit -m "Update living EDA + FE (census, catalog, galleries, reports)"
          git pull --rebase origin main
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: "Run CI on the cron's commits (GITHUB_TOKEN pushes never fire on-push)"
      # L2 (ideal): la mitad "correr CI de verdad". workflow_dispatch es la excepción
      # documentada a la regla anti-recursión, así que este disparo SÍ crea el run.
      if: always() && (steps.run.outputs.pushed == 'true' || steps.model.outputs.pushed == 'true' || steps.eda.outputs.pushed == 'true')
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh workflow run ci.yml --ref main || echo "::warning::no se pudo disparar CI sobre el commit de datos"

    - name: Redeploy the website on a rebuild (Netlify build hook)
      # L4: keyed on REBUILT (covers the stale self-healing path, which used to
      # leave the site a month behind) and on the modeling block having produced
      # fresh forecasts. The web build re-fetches panel + forecasts from this repo.
      if: steps.run.outputs.rebuilt == 'true' && steps.model.outcome == 'success'
      env:
        HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
      run: |
        if [ -n "$HOOK" ]; then
          curl -fsS -X POST -d '{}' "$HOOK" && echo "Redeploy del sitio disparado (Netlify)."
        else
          echo "::warning::NETLIFY_BUILD_HOOK no configurado -- el sitio no se redesplegará solo."
          echo "Crea un Build hook en Netlify (Site settings -> Build & deploy -> Build hooks)"
          echo "y agrégalo como secret del repo: NETLIFY_BUILD_HOOK."
        fi

    - name: Email heartbeat via SES (every run -- no-op, new bulletin, or failure)
      if: always()
      env:
        JOB_STATUS: ${{ job.status }}
        NEW: ${{ steps.run.outputs.new || 'n/d (el job no llegó al conteo)' }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # Reuses the AWS creds already configured above. The IAM user needs
        # ses:SendEmail. From is noreply@visapredictai.com (DKIM-verified domain
        # we control) so it passes the recipient's SPF/DMARC -- sending From the
        # uacj address via SES was hard-failing Microsoft 365's SPF and getting
        # dropped. In sandbox the To (al263483@...) stays a verified identity.
        #
        # One-line ML drift status from the monitor (reports/governance/drift_report.json), surfaced so a
        # human reviews any flagged bulletin movement. python is already on PATH in this job.
        DRIFT_LINE="n/d (sin reporte este run)"
        if [ -f reports/governance/drift_report.json ]; then
          DRIFT_LINE=$(python -c "import json;d=json.load(open('reports/governance/drift_report.json'));p=d.get('performance',{});n=len(d.get('data',{}).get('flagged',[]));s='DRIFT DETECTADO' if d.get('drift_detected') else 'sin novedad';print(s+' -- desempeno x'+str(p.get('perf_ratio','?'))+', '+str(n)+' serie(s) con movimiento sin precedente')")
        fi
        # L2: veredicto del guardián de consistencia (regla #0) sobre el dato recién
        # comiteado — el push del cron no dispara CI, así que este correo es donde
        # el humano ve el drift n_obs↔prosa el día que ocurre.
        CONS_LINE="n/d (sin corrida este run)"
        if [ -f /tmp/consistency.txt ]; then
          # tr: sin comillas/backslashes que rompan el JSON del heredoc de SES
          CONS_LINE=$(tail -1 /tmp/consistency.txt | tr -d '"\\')
        fi
        # EDA vivo (4g): censo + reporte regenerados con el boletín nuevo.
        EDA_LINE="n/d (sin rebuild este run)"
        if [ -f /tmp/eda.txt ]; then
          EDA_LINE=$(tr -d '"\\' < /tmp/eda.txt)
        fi
        # FE vivo (AF): catálogo + galería + reportes bilingües del mismo bloque.
        FE_LINE="n/d (sin rebuild este run)"
        if [ -f /tmp/fe.txt ]; then
          FE_LINE=$(tr -d '"\\' < /tmp/fe.txt)
        fi
        # Gobernanza campeon-retador-sombra (AO6): un fallo cronico del veredicto o
        # del ledger sombra era invisible en el correo (audit 4-jul) — justo cuando
        # la promocion retenida de naive1 depende de que la evidencia se acumule.
        CHAMPION_LINE="n/d (sin rebuild este run)"
        if [ -f /tmp/champion.txt ]; then
          CHAMPION_LINE=$(tr -d '"\\' < /tmp/champion.txt)
        fi
        SHADOW_LINE="n/d (sin rebuild este run)"
        if [ -f /tmp/shadow.txt ]; then
          SHADOW_LINE=$(tr -d '"\\' < /tmp/shadow.txt)
        fi
        cat > /tmp/ses.json <<JSON
        {
          "FromEmailAddress": "VisaPredict CI <noreply@visapredictai.com>",
          "Destination": {"ToAddresses": ["al263483@alumnos.uacj.mx"]},
          "Content": {"Simple": {
            "Subject": {"Data": "VisaPredict | corrida $JOB_STATUS — $NEW boletín(es) nuevo(s)"},
            "Body": {"Text": {"Data": "El proceso de actualización corrió.\nResultado del job: $JOB_STATUS\nBoletines nuevos congelados este run: $NEW\nDrift ML: $DRIFT_LINE\nConsistencia (regla #0): $CONS_LINE\nEDA vivo: $EDA_LINE\nFE vivo: $FE_LINE\nCampeon-retador: $CHAMPION_LINE\nSombra: $SHADOW_LINE\nLogs: $RUN_URL"}}
          }}
        }
        JSON
        # L7: si SES falla (cuota/sandbox), el job entero quedaba `failure` y el
        # issue "scrape is failing" se abría con los datos perfectamente
        # procesados — alerta con título mentiroso. El correo es observabilidad,
        # no pipeline: degradar a warning (el watchdog L6 cubre el silencio).
        aws sesv2 send-email --region us-east-1 --cli-input-json file:///tmp/ses.json \
          || echo "::warning::el correo SES falló (los datos NO se afectan); revisar cuota/identidad SES"

    - name: Alert on failure (open or append a tracking issue)
      if: failure()
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd  # v8
      with:
        script: |
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = `The scheduled **Freeze new bulletin and rebuild** run failed (gate red, fetch error, or crash).\nLogs: ${runUrl}`;
          const { data: open } = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo,
            labels: 'scrape-failure', state: 'open',
          });
          if (open.length) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: open[0].number, body,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'Daily Visa Bulletin scrape is failing', body,
              labels: ['scrape-failure'],
            });
          }
