name: Freeze new bulletin and rebuild

# The monthly Visa Bulletins are FIXED once published, so there is no reason to
# re-scrape all ~290 every day. This job is S3-driven: it pulls the frozen HTML
# from S3, fetches ONLY a newly published month (freeze_snapshots.py,
# skip-if-exists), and rebuilds the CSVs/panel/DuckDB **only when something new
# arrived**. On a week with no new bulletin it is a cheap no-op. Runs weekly
# (bulletins come out ~monthly) instead of daily.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1'  # Mondays 12:00 UTC -- catches a new monthly bulletin within a week

permissions:
  contents: write
  issues: write   # to open/append a failure-alert issue

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'   # match the dev environment (pandas 3.x) for reproducibility

    - name: Install runtime dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .   # runtime deps from pyproject (single source of truth)

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Freeze a newly published bulletin, then rebuild only if one arrived
      id: run
      run: |
        set -eo pipefail

        # The frozen HTML in S3 is the source of truth. Pull it down so
        # freeze's skip-if-exists fetches ONLY a month not already frozen.
        aws s3 sync s3://visapredictai-raw-snapshots/raw-html/ data/snapshots/ --quiet
        python freeze_snapshots.py > /tmp/new_count   # crashes fail the step under set -e
        new=$(cat /tmp/new_count)
        echo "new=$new" >> "$GITHUB_OUTPUT"   # surfaced to the email step below

        if [ "$new" = "0" ]; then
          echo "No new bulletin this run -- nothing to rebuild."
          exit 0
        fi
        echo "$new new bulletin(s) frozen -- backing up and rebuilding."

        # 1. Push the new raw HTML to S3 (immutable backup).
        aws s3 sync data/snapshots/ s3://visapredictai-raw-snapshots/raw-html/

        # 2. Rebuild CSVs/panel/DuckDB OFFLINE from the frozen snapshots.
        pip install -e ".[dev]"        # duckdb + pytest for the DB rebuild/gate
        python scrape_all.py           # parse snapshots -> per-country CSVs (no network)
        python build_panel.py          # -> data/processed/visa_panel_long.csv

        # 3. Quality gate -- nothing is committed unless these pass.
        python tests/test_parsers.py
        python tests/test_extraction.py
        python tests/test_panel_integrity.py

        # 4. Refresh the DuckDB star schema and validate it accepts the new data
        #    (the .duckdb/.parquet stay gitignored -- regenerable with `make db`).
        python build_database.py
        # --cov-fail-under=0: this targeted DB-contract run doesn't import the
        # scraper modules, so the global 65% coverage gate (pyproject) would
        # spuriously fail it. The plain-script gate above already covers those.
        python -m pytest tests/test_database.py --cov-fail-under=0

        # 5. Commit the refreshed CSVs/panel (snapshots + DB are gitignored).
        git config --local user.email "168046724+jrebull@users.noreply.github.com"
        git config --local user.name "Javier Rebull"
        git add -A
        if git diff --cached --quiet; then
          echo "New HTML frozen but parsed data unchanged -- nothing to commit."
        else
          git commit -m "Add bulletin $(date -u +%Y-%m): refresh panel from frozen HTML"
          git push
        fi

    - name: Email heartbeat via SES (every run -- no-op, new bulletin, or failure)
      if: always()
      env:
        JOB_STATUS: ${{ job.status }}
        NEW: ${{ steps.run.outputs.new || 'n/d (el job no llegó al conteo)' }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        # Reuses the AWS creds already configured above. The IAM user needs
        # ses:SendEmail. From is noreply@visapredictai.com (DKIM-verified domain
        # we control) so it passes the recipient's SPF/DMARC -- sending From the
        # uacj address via SES was hard-failing Microsoft 365's SPF and getting
        # dropped. In sandbox the To (al263483@...) stays a verified identity.
        cat > /tmp/ses.json <<JSON
        {
          "FromEmailAddress": "VisaPredict CI <noreply@visapredictai.com>",
          "Destination": {"ToAddresses": ["al263483@alumnos.uacj.mx"]},
          "Content": {"Simple": {
            "Subject": {"Data": "VisaPredict | corrida $JOB_STATUS — $NEW boletín(es) nuevo(s)"},
            "Body": {"Text": {"Data": "El proceso de actualización corrió.\nResultado del job: $JOB_STATUS\nBoletines nuevos congelados este run: $NEW\nLogs: $RUN_URL"}}
          }}
        }
        JSON
        aws sesv2 send-email --region us-east-1 --cli-input-json file:///tmp/ses.json

    - name: Alert on failure (open or append a tracking issue)
      if: failure()
      uses: actions/github-script@v8
      with:
        script: |
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = `The scheduled **Freeze new bulletin and rebuild** run failed (gate red, fetch error, or crash).\nLogs: ${runUrl}`;
          const { data: open } = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo,
            labels: 'scrape-failure', state: 'open',
          });
          if (open.length) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: open[0].number, body,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'Daily Visa Bulletin scrape is failing', body,
              labels: ['scrape-failure'],
            });
          }
