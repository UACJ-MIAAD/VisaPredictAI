name: Update Graphs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight

permissions:
  contents: write
  issues: write   # to open/append a failure-alert issue

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'   # match the dev environment (pandas 3.x) for reproducibility

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .   # runtime deps from pyproject (single source of truth)

    - name: Run employment-based scraping script
      run: python scrape_visa_bulletins.py

    - name: Run family-based scraping script
      run: python scrape_family_visa_bulletins.py

    - name: Build consolidated long panel
      run: python build_panel.py

    - name: Quality gate — tests must pass before anything is committed
      run: |
        python tests/test_parsers.py          # pure parsing/classification functions
        python tests/test_extraction.py       # offline extraction over HTML fixtures
        python tests/test_panel_integrity.py  # hard invariants of the freshly built panel

    # Figures are no longer versioned (regenerate locally with `make figures`),
    # so the daily run no longer produces or commits them.

    - name: Commit and push changes
      run: |
        git config --local user.email "168046724+jrebull@users.noreply.github.com"
        git config --local user.name "Javier Rebull"
        # Stage everything (incl. the new long panel, which is untracked the
        # first time and would be missed by `git commit -am`).
        git add -A
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update graphs and consolidated panel with latest data"
          git push
        fi

    - name: Alert on failure (open or append a tracking issue)
      if: failure()
      uses: actions/github-script@v8
      with:
        script: |
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const body = `The scheduled **Update Graphs** run failed (gate red, scrape abort, or crash).\nLogs: ${runUrl}`;
          const { data: open } = await github.rest.issues.listForRepo({
            owner: context.repo.owner, repo: context.repo.repo,
            labels: 'scrape-failure', state: 'open',
          });
          if (open.length) {
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: open[0].number, body,
            });
          } else {
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: 'Daily Visa Bulletin scrape is failing', body,
              labels: ['scrape-failure'],
            });
          }
