name: _test hook (temporary)

# Throwaway: POSTs to the NETLIFY_BUILD_HOOK secret and reports the HTTP code so
# we can confirm the build hook is valid without exposing the URL. Delete after.
on:
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: POST the build hook
        env:
          HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then echo "::error::NETLIFY_BUILD_HOOK vacío"; exit 1; fi
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST -d '{}' "$HOOK")
          echo "HTTP $code del build hook"
          case "$code" in
            200|201|202|204) echo "✅ Hook válido — Netlify aceptó el disparo (deploy en curso)";;
            *) echo "::error::El hook respondió $code (¿URL incorrecta o revocada?)"; exit 1;;
          esac
