# G5 (plan auditoría 2026-07-11) + A5 (plan 3 repos 2026-07-12): supply chain del lado
# Python, programado. Sin secretos: audita los LOCKS versionados (macOS arm64 = entorno
# de referencia; Linux x86_64 = lo que instalan CI y el cron) contra las bases de
# advisories (OSV/PyPI) y emite el SBOM CycloneDX del perfil dev como artefacto.
# --disable-pip: los locks están 100% pinneados, se parsean sin resolver — necesario
# para auditar locks de OTRA plataforma (el dry-run de pip rechaza pins ajenos al SO).
name: Scheduled quality (Python)

on:
  schedule:
    - cron: "37 14 * * 1"  # lunes, tras el watchdog
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
      - run: pip install "pip-audit==2.10.1"   # A5: herramienta de audit también pinneada
      # GATE fail-closed en los perfiles chicos (runtime/dev, ambas plataformas):
      # dependencias directas — se arreglan por PR con tests y rollback, como el bump
      # de requests 2.33.0 que estrenó esta política.
      - name: Audit runtime + dev locks (gate, macOS arm64 + Linux x86_64)
        run: |
          pip-audit -r locks/runtime.txt --no-deps --disable-pip
          pip-audit -r locks/dev.txt --no-deps --disable-pip
          pip-audit -r locks/runtime-linux-x86_64.txt --no-deps --disable-pip
          pip-audit -r locks/dev-linux-x86_64.txt --no-deps --disable-pip
      # A5: el perfil model dejó de ser report-only. GATE con allowlist EXPLÍCITA:
      # los 2 avisos aceptados (torch + pytorch-lightning) están triados con superficie,
      # decisión, owner y fecha de revisión (2026-08-12) en docs/SECURITY_TRIAGE.md —
      # cualquier aviso NUEVO (incluido un high/critical) bloquea este job. Al cerrar un
      # aviso (bump vía `make lock` deliberado), retirar su --ignore-vuln aquí Y su fila del
      # triage. Ronda 10: el upgrade chronos 2.3.1 + transformers 5.13.1 CERRÓ PYSEC-2026-2290
      # (RCE) y retiró 7 ignores (los 3 de transformers 4.x + diskcache/msgpack/pydantic-
      # settings/pypdf, ausentes del cierre fresco). No se añadió ningún ignore nuevo.
      - name: Audit model locks (gate con allowlist triada — docs/SECURITY_TRIAGE.md)
        run: |
          IGNORES=(
            --ignore-vuln CVE-2025-3000          # torch 2.12.0 (sin fix; offline, checkpoints propios)
            --ignore-vuln PYSEC-2026-3043        # pytorch-lightning 2.5.6 (alias CVE-2026-31221; sin fix)
          )
          pip-audit -r locks/model-cpu.txt --no-deps --disable-pip "${IGNORES[@]}"
          pip-audit -r locks/model-cpu-linux-x86_64.txt --no-deps --disable-pip "${IGNORES[@]}"
      # A5: sin `|| true` — si CycloneDX falla, el job falla (antes un SBOM roto
      # subía un artefacto vacío en silencio).
      - name: SBOM CycloneDX (perfil dev)
        run: pip-audit -r locks/dev.txt --no-deps --disable-pip --format cyclonedx-json -o sbom-dev.cdx.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-dev-cyclonedx
          path: sbom-dev.cdx.json
          retention-days: 30
