name: CI

# Validates every code change (separate from the daily data-refresh cron):
# lint + the full offline test suite. The data-refresh workflow
# (update_graphs.yml) runs the same tests as a gate before committing data.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff==0.15.17 mypy==2.1.0 pytest==9.1.0 pytest-cov==7.1.0

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports *.py tests/*.py

      - name: Tests + coverage gate (pytest)
        run: pytest
