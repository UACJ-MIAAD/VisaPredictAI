name: CI

# Validates every code change (separate from the daily data-refresh cron):
# lint + the full offline test suite. The data-refresh workflow
# (freeze_and_rebuild.yml) runs the same tests as a gate before committing data.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate cookiecutter structure
        run: bash tools/validate_structure.sh

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports *.py vp_model/*.py tests/*.py

      - name: Tests + coverage gate (pytest)
        run: pytest

  # Capa de modelado: pesada (darts/torch) y requiere la BD, por eso es un job
  # aparte. Sin él, los tests de vp_model se saltan en silencio (importorskip).
  model-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install with modeling extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,model]"

      - name: Build the panel + DuckDB warehouse (modeling reads from it)
        run: |
          python build_panel.py
          python build_database.py

      - name: Modeling tests + vp_model coverage
        run: make test-model PY=python

  # Guardián de consistencia (la máxima del proyecto): web/LaTeX/paper/README/docs deben
  # dar el MISMO número que reports/key_facts.json. Lightweight: solo pyyaml + el JSON
  # committeado. Checkout del repo web tolerante (si es privado/inaccesible, se omiten sus
  # chequeos y el job sigue validando los artefactos del repo de datos).
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Checkout the web repo (best-effort, for cross-repo claims)
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          repository: UACJ-MIAAD/VisaPredictAI_WEB
          path: web_repo
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: pip install pyyaml
      - name: Check artifact consistency
        env:
          VP_WEB_DIR: web_repo
        run: python tools/check_consistency.py
