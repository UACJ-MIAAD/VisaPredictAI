name: CI

# Validates every code change (separate from the daily data-refresh cron):
# lint + the full offline test suite. The data-refresh workflow
# (freeze_and_rebuild.yml) runs the same tests as a gate before committing data.
on:
  push:
    branches: [main]
  pull_request:
  # L2: el cron de datos pushea con GITHUB_TOKEN (no dispara `on: push` por la regla
  # anti-recursión de GitHub) y en su lugar invoca `gh workflow run ci.yml` tras el push.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Backstop server-side del hook commit-msg (tools/check_no_coauthor.sh). El hook
  # local es opt-in y evadible con --no-verify; este job escanea los mensajes de los
  # commits del push/PR con el MISMO patrón (mantenerlos alineados).
  commit-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
      - name: Commit message policy
        env:
          BEFORE: ${{ github.event.before }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          PATTERN='co-authored-by|@anthropic|anthropic\.com|generated with .*claude|claude code|claude-session|claude\.ai|noreply@anthropic'
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "$BASE_REF" --quiet
            range="origin/$BASE_REF..HEAD"
          elif [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE" 2>/dev/null; then
            range="$BEFORE..HEAD"
          else
            range="HEAD~20..HEAD"   # primer push / force-push: ventana razonable
          fi
          fail=0
          for c in $(git rev-list "$range" 2>/dev/null); do
            if git log -1 --format='%B' "$c" | grep -qiE "$PATTERN"; then
              echo "::error::Commit $c no cumple la política de mensajes del repo:"
              git log -1 --format='  %h %s' "$c"
              fail=1
            fi
          done
          [ "$fail" = "0" ] && echo "✓ mensajes conformes en $range"
          exit "$fail"

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # Ronda 3: la suite pytest ejercita el gate de contratos (test_contracts
          # llama check() sobre el repo real) y el check del sha es fail-closed en
          # shallow — SU ESTRENO cazó este checkout depth-1 en el primer run.
          fetch-depth: 0

      - name: Validate project structure contract
        run: bash tools/validate_structure.sh

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: |
          # A5: toolchain de instalación PINNEADO (pip/setuptools/wheel) — mismo pip que
          # el entorno de referencia ante/; sin esto cada corrida instala el pip del día.
          python -m pip install "pip==26.1.2" "setuptools==83.0.0" "wheel==0.47.0"
          # C3+A5: instalación por LOCK transitivo DE LA PLATAFORMA DEL RUNNER
          # (locks/dev-linux-x86_64.txt, con hashes sha256 → hash-checking mode de pip).
          # El lock macOS arm64 (locks/dev.txt) es el del entorno de referencia; ambos
          # se generan sin drift de versiones (uv pip compile -c lock-macOS).
          pip install --require-hashes -r locks/dev-linux-x86_64.txt
          pip install -e . --no-deps

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy --ignore-missing-imports --explicit-package-bases vp_data/*.py pipeline/*.py vp_model/*.py tests/*.py tools/*.py experiments/*.py

      - name: Tests + coverage gate (pytest)
        run: pytest

  # Capa de modelado: pesada (darts/torch) y requiere la BD, por eso es un job
  # aparte. Sin él, los tests de vp_model se saltan en silencio (importorskip).
  model-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # E1: la corrida amplia de cobertura ejecuta la suite COMPLETA (incluye
          # test_contracts, cuyo check del sha del manifiesto es fail-closed en
          # clones shallow) — mismo motivo que lint-and-test.
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
          cache: pip

      - name: Install with modeling extra
        run: |
          # A5: toolchain de instalación pinneado (mismo pin que lint-and-test)
          python -m pip install "pip==26.1.2" "setuptools==83.0.0" "wheel==0.47.0"
          # P0R.4R/R3: wheel CPU +cpu del pin CANÓNICO (sin él, .[model] baja el torch CUDA de PyPI
          # ~GB y rompe la intención CPU). Debe coincidir con el pin torch de pyproject.toml
          # (2.13.0) — lo verifica tests/test_workflow_torch_pin.py.
          pip install torch==2.13.0+cpu --index-url https://download.pytorch.org/whl/cpu
          # C3/A5: constraints del lock Linux x86_64 (closure real de .[dev,model] en la
          # plataforma del runner, compilado SIN drift contra el freeze de referencia
          # locks/model-cpu.txt). Sigue siendo -c y no -r: torch debe venir del índice
          # CPU (arriba), no del pin CUDA de PyPI — y un constraints file no admite
          # hashes (limitación de pip), por eso este perfil va sin --generate-hashes.
          pip install -e ".[dev,model]" -c locks/model-cpu-linux-x86_64.txt
          # el pin CPU debe SOBREVIVIR a .[model]: sin esto, un torch CUDA silencioso pasaría el CI.
          pip check
          python -c 'import torch; assert torch.__version__ == "2.13.0+cpu", torch.__version__'
          # P0R.5 R3: sello del inventario del PRODUCTO antes de cualquier operación DVC (prueba de
          # no-contaminación: DVC corre en un ENV AISLADO, no en este intérprete).
          python -m pip freeze --all | sort > /tmp/prod_before.txt

      - name: Build the panel + DuckDB warehouse (modeling reads from it)
        run: |
          python -m pipeline.build_panel
          python -m pipeline.build_database

      - name: DVC lock matches the committed pipeline (E2)
        # scrape/database quedan fuera: sus deps (snapshots privados) / outs (cache S3)
        # no existen en CI. Los stages git-only prueban que dvc.lock no está stale
        # (antes llevaba semanas desfasado y nada lo detectaba). C1: eda_facts y
        # fe_facts entraron al DAG — sus deps/outs viven en git, así que se vigilan.
        run: |
          # P0R.5 R3: DVC corre desde su ENTORNO AISLADO content-addressed (.vp_envs/dvc-tool), JAMÁS
          # en el intérprete del producto (dvc[s3] arrastra requests/tqdm más nuevos y los degradaría).
          # El build va en su propia línea (sus logs de pip NO deben caer en $out); el exec reusa
          # (instantáneo) y aplica el cache guard internamente, así $out es solo el JSON de dvc.
          python -m tools.python_env build --profile dvc-tool
          out=$(python -m tools.python_env exec --profile dvc-tool -- dvc status --json panel bulletins key_facts eda_facts fe_facts)
          echo "$out"
          [ "$out" = "{}" ] || { echo "::error::dvc.lock desfasado del pipeline commiteado — corre make repro y commitea el lock"; exit 1; }

      - name: Facts are re-derivable from the data (real partial dvc repro — C2)
        # The consistency job checks prose-vs-JSON; this closes the loop by checking
        # JSON-vs-DATA through the REAL dag: force-reproduce the fact stages with dvc
        # (portable `python` commands — this run is itself the clean-clone proof) and
        # fail if any committed output drifts from the pipeline. DVC desde el env aislado; los
        # comandos de stage (`python -m ...`) heredan el PATH ambiente = intérprete del PRODUCTO.
        run: |
          python -m tools.python_env exec --profile dvc-tool -- dvc repro --force --single-item key_facts eda_facts fe_facts
          git diff --exit-code reports/governance/key_facts.json reports/latex/key_facts.tex \
            reports/eda/eda_facts.json reports/fe/fe_facts.json reports/latex/fe_facts.tex

      - name: No model to DVC contamination (R3 -- inventario del producto intacto)
        # El corazón del hallazgo B1: instalar/ejecutar DVC NO debe mover una sola dep del producto.
        # Compara el inventario ANTES/DESPUÉS de todas las operaciones DVC y reafirma los pines que
        # dvc[s3] intentaría subir (requests 2.33.0 / tqdm 4.67.3).
        run: |
          python -m pip freeze --all | sort > /tmp/prod_after.txt
          diff /tmp/prod_before.txt /tmp/prod_after.txt \
            || { echo "::error::el inventario del producto cambió tras operaciones DVC (contaminación)"; exit 1; }
          pip check
          python -c 'import importlib.metadata as m; assert m.version("requests")=="2.33.0", m.version("requests"); assert m.version("tqdm")=="4.67.3", m.version("tqdm")'

      - name: Modeling tests + vp_model coverage
        run: make test-model PY=python
      # G3: pisos POR MÓDULO crítico (ledger/promoción/bandas/métricas…) — el promedio
      # del job no puede esconder un módulo crítico flojo. Pisos solo suben editando
      # docs/coverage_floors.json en un PR (trinquete explícito).
      - name: Per-module coverage floors (G3)
        run: |
          coverage json --fail-under=0 -o /tmp/cov.json
          python tools/check_coverage_floors.py /tmp/cov.json
      # E1 (plan 2026-07-12): cobertura HONESTA por capa. Instrumentación AMPLIA
      # (vp_data+pipeline+vp_model+experiments+tools) sobre la suite completa, en un
      # paso SEPARADO: no toca el gate selectivo de pyproject (fail_under=65 sobre
      # los 3 módulos de parsing, job lint-and-test) ni el piso de vp_model de
      # test-model. Pisos por capa = baseline honesta (docs/coverage_floors.json,
      # sección layers): no exigen subir, rompen si una capa CAE. El summary publica
      # ambos denominadores para que nadie lea "74%" como cobertura del repo.
      # COVERAGE_FILE separado: no pisa el .coverage de make test-model (gate G3).
      - name: Layer coverage floors (broad instrumentation — E1)
        run: |
          COVERAGE_FILE=/tmp/.coverage.broad python -m pytest -o addopts="" -q \
            --cov=vp_data --cov=vp_model --cov=pipeline --cov=experiments --cov=tools \
            --cov-report= --cov-fail-under=0
          COVERAGE_FILE=/tmp/.coverage.broad coverage json --fail-under=0 -o /tmp/cov_broad.json
          python tools/check_coverage_floors.py /tmp/cov_broad.json --layers \
            --json-out /tmp/coverage_by_layer.json --summary "$GITHUB_STEP_SUMMARY"
      # El JSON va como ARTEFACTO de CI, no al repo: reports/governance/ está bajo
      # el manifiesto de release (escribirlo ahí rompería la coherencia manifiesto↔árbol).
      - name: Upload layer coverage artifact (E1)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-by-layer
          path: /tmp/coverage_by_layer.json
          if-no-files-found: ignore
          retention-days: 90

  # Guardián de consistencia (la máxima del proyecto): web/LaTeX/paper/README/docs deben
  # dar el MISMO número que reports/governance/key_facts.json. Lightweight: solo pyyaml + el JSON
  # committeado. Checkout del repo web tolerante (si es privado/inaccesible, se omiten sus
  # chequeos y el job sigue validando los artefactos del repo de datos).
  consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          # Ronda 3 audit: check_contracts verifica que el git_sha del manifiesto EXISTA
          # (git cat-file -e) y es fail-closed en clones shallow -- necesita historial.
          fetch-depth: 0
      - name: Checkout the web repo (best-effort, for cross-repo claims)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        continue-on-error: true
        with:
          repository: UACJ-MIAAD/VisaPredictAI_WEB
          path: web_repo
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
      - run: pip install pyyaml==6.0.3   # mismo pin que [dev] (E3)
      - name: Check artifact consistency
        env:
          VP_WEB_DIR: web_repo
        run: python tools/check_consistency.py
      # B3 (plan auditoría 2026-07-11): contratos cross-repo — columnas/llaves requeridas
      # de cada artefacto publicado + corte de añada única. Cero dependencias.
      - name: Check artifact contracts
        run: python tools/check_contracts.py
      # E3: trinquete de deuda — los marcadores (except amplios sin razón, ignores,
      # TODOs) jamás suben respecto a docs/debt_baseline.json. Cero dependencias.
      - name: Check debt ratchet
        run: python tools/check_debt.py
      # I2: todo entrypoint de experiments/ debe estar clasificado (producto/
      # deliverable/investigacion/diagnostico/archivo) con consumidor declarado.
      - name: Check experiments inventory
        run: python tools/check_experiments_inventory.py
      # D2: catálogo gobernado de modelos — baselines obligatorias en toda tabla de
      # comparación; el manifiesto campeón solo despliega clase 'active'.
      - name: Check model catalog
        run: python tools/check_model_catalog.py
      # P0R.3 (ronda 10): guard DOCUMENTAL — la prosa (SECURITY_TRIAGE + THREAT_MODEL) no debe
      # derivar de la fuente única security/python_advisories.json. La AUTORIDAD de supply chain
      # es el job `supply-chain` (runner vs locks); esto solo evita deriva de docs.
      - name: Check docs ↔ advisories JSON
        run: python tools/check_supply_chain_triage.py
      # P0R.5 (R4): cero rutas dvc fuera del wrapper `python_env exec` (git ls-files + AST).
      - name: DVC gobernado (sin instalaciones/invocaciones sueltas)
        run: python tools/check_no_stray_dvc.py
      # P0R.5 (C4/B2): trinquete de migración del call graph fuera de ante/ante_nf.
      - name: Sin uso legacy nuevo de ante/ante_nf (trinquete)
        run: python tools/check_no_legacy_envs.py

  # P0R.3: gate de supply chain como CHECK DE CAMBIO (PR/push), no solo cron. Autoridad única
  # = tools/audit_python_supply_chain.py reconciliando los locks contra el JSON. Sin path
  # filters (debe poder ser check requerido en branch protection, P7).
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
      - run: pip install "pip-audit==2.10.1"
      - name: Audit supply chain (runner único — security/python_advisories.json)
        # -m: el auditor importa tools/lock_contracts.py (contrato estático + manifiesto primero).
        # P0R.4R2: emite el receipt también en el CI de PR (no solo en Scheduled quality).
        run: python -m tools.audit_python_supply_chain --receipt supply-chain-receipt.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: supply-chain-receipt-ci
          path: supply-chain-receipt.json
          if-no-files-found: error
          retention-days: 30

  # P0R.4R: instalación REAL de los locks deep en runners hosteados (antes CI solo los AUDITABA como
  # texto; nada probaba resolución + hashes + pip check + imports). CUDA queda en resolución+hash+
  # audit — su ejecución A10G se certifica en P0R.5. macos-15 = runner ARM64 estándar.
  # P0R.4R2: sin `torch:` en la matriz — la versión esperada la DERIVA tools/deep_smoke.py desde
  # lock_contracts.DEEP_RUNTIME (la matriz no se autoconfirma). Nombre de job ESTABLE (no incluye la
  # versión de torch): así el check requerido (via ci-gate) no cambia de nombre al bumpear torch.
  deep-lock-install:
    name: deep-lock-install / ${{ matrix.variant }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: linux-cpu
            os: ubuntu-24.04
            lock: locks/deep-linux-x86_64-cpu.txt
          - variant: macos-arm64
            os: macos-15
            lock: locks/deep-macos-arm64.txt
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
      - name: Install deep lock (--require-hashes) + real smoke
        run: |
          # toolchain PINEADO (mismo que el generador de locks); luego el cierre HASHEADO del perfil.
          python -m pip install "pip==26.1.2" "setuptools==83.0.0" "wheel==0.47.0"
          pip install --require-hashes -r ${{ matrix.lock }}
          # deep_smoke corre `pip check` internamente + deriva plataforma/torch del contrato.
          python -m tools.deep_smoke --lock ${{ matrix.lock }} --receipt deep-receipt-${{ matrix.variant }}.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: deep-install-receipt-${{ matrix.variant }}
          path: deep-receipt-${{ matrix.variant }}.json
          if-no-files-found: error
          retention-days: 30

  # P0R.5 R6: DVC se construye en su ENTORNO CONTENT-ADDRESSED AISLADO (tools.python_env), NUNCA en el
  # python del job, y se hace smoke por la interfaz única con recibo ligado al commit/env. Matriz
  # Linux+macOS. Nombre de job ESTABLE (check requerible). El python del job NO recibe dvc: se verifica.
  dvc-tool-install:
    name: dvc-tool-install
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: linux-x86_64
            os: ubuntu-24.04
          - variant: macos-arm64
            os: macos-15
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
      - name: Build isolated dvc-tool env + governed smoke + receipt
        env:
          # B6: procedencia REAL — el checkout de un PR es el merge sintético; el head fuente y la base
          # vienen del evento para que el recibo no induzca a creer que certifica el head.
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          # toolchain PINEADO (mismo que el generador de locks). NO se instala dvc en ESTE python:
          # python_env crea un venv content-addressed y ahí instala el lock hasheado.
          python -m pip install "pip==26.1.2" "setuptools==83.0.0" "wheel==0.47.0"
          # sello del inventario del job ANTES: python_env NO debe tocarlo (aislamiento real).
          python -m pip freeze --all | sort > /tmp/job_before.txt
          python -m tools.dvc_tool_smoke --receipt dvc-tool-receipt-${{ matrix.variant }}.json --sbom sbom-dvc-tool-env-${{ matrix.variant }}.json
          python -m pip freeze --all | sort > /tmp/job_after.txt
          diff /tmp/job_before.txt /tmp/job_after.txt \
            || { echo "::error::construir el env dvc-tool contaminó el python del job"; exit 1; }
          # el env aislado NO debe tener dvc en el python del JOB (prueba de que no se derramó).
          python -c "import importlib.util,sys; sys.exit(0 if importlib.util.find_spec('dvc') is None else 1)" \
            || { echo "::error::dvc quedó importable en el python del job"; exit 1; }
          # B17: validador ESTRICTO del recibo contra el repo (esquema exacto, smoke_ok, git limpio,
          # source_head, dvc_status=0, site_cache_confined, hashes de lock/lockset/dvc.in actuales).
          python -m tools.validate_dvc_receipt --receipt dvc-tool-receipt-${{ matrix.variant }}.json --sbom sbom-dvc-tool-env-${{ matrix.variant }}.json
          # gates R4 + C4.
          python tools/check_no_stray_dvc.py
          python tools/check_no_legacy_envs.py
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dvc-tool-receipt-${{ matrix.variant }}
          path: |
            dvc-tool-receipt-${{ matrix.variant }}.json
            sbom-dvc-tool-env-${{ matrix.variant }}.json
          if-no-files-found: error
          retention-days: 30

  # P0R.5 R6: contrato del sistema de entornos content-addressed (determinismo del env_id, aislamiento,
  # detección de tamper, y el gate anti-dvc-suelto). Nombre ESTABLE (check requerible).
  environment-contract:
    name: environment-contract
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
          cache: pip
      - name: Install dev toolchain
        run: |
          python -m pip install "pip==26.1.2" "setuptools==83.0.0" "wheel==0.47.0"
          pip install --require-hashes -r locks/dev-linux-x86_64.txt
          pip install -e . --no-deps
      - name: Env-system contract + isolation + tamper + stray-dvc gate
        run: |
          python tools/check_no_stray_dvc.py
          python tools/check_no_legacy_envs.py
          # C3: TODOS los perfiles declarados computan env_id determinista (deep exige variante).
          python -c "import tools.python_env as pe; combos=[('runtime',None),('dev',None),('model',None),('deep','cpu'),('deep','cu126'),('dvc-tool',None)]; ids={pe.env_id(p,v) for p,v in combos}; assert len(ids)==len(combos), 'env_id colisiona o falta'; print('env_id OK:', {f'{p}/{v}' if v else p: pe.env_id(p,v)[:12] for p,v in combos})"
          python -m pytest tests/test_python_env.py tests/test_dvc_tool.py -q -p no:cacheprovider --no-cov

  # P0R.5 R8R2 (B17): descarga los recibos dvc-tool de AMBAS plataformas y los cruza — valida cada uno
  # contra el repo (git limpio, source_head, dvc_status=0, site_cache_confined, hashes) y exige que el
  # DAG canónico sea IDÉNTICO Linux↔macOS. Nombre ESTABLE (check requerible).
  environment-receipts:
    name: environment-receipts
    timeout-minutes: 10
    needs: [dvc-tool-install]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: '3.14'
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dvc-tool-receipt-linux-x86_64
          path: rc-linux
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dvc-tool-receipt-macos-arm64
          path: rc-macos
      - name: Cross-validate receipts + SBOMs (schema + repo + dag_hash equality)
        env:
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          python -m tools.validate_dvc_receipt --cross \
            rc-linux/dvc-tool-receipt-linux-x86_64.json rc-linux/sbom-dvc-tool-env-linux-x86_64.json \
            rc-macos/dvc-tool-receipt-macos-arm64.json rc-macos/sbom-dvc-tool-env-macos-arm64.json

  # P0R.4R2: check ESTABLE y único a exigir en branch protection. Depende de todos los jobs y falla
  # si CUALQUIERA no terminó en success (failure/cancelled/skipped incluidos). Los nombres largos del
  # matrix deep NO deben registrarse como checks requeridos (cambian al bumpear torch).
  ci-gate:
    name: ci-gate
    if: always()
    needs: [commit-policy, lint-and-test, model-tests, consistency, supply-chain, deep-lock-install, dvc-tool-install, environment-contract, environment-receipts]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job was not success
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "resultados: ${{ join(needs.*.result, ', ') }}"
          echo "✗ ci-gate: al menos un job no terminó en success"
          exit 1
      - name: All required jobs succeeded
        run: echo "ci-gate OK - todos los jobs en success"
