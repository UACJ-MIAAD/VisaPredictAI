# Local quality gate before each commit. Install once with: pre-commit install
# Run on everything with: pre-commit run --all-files
# Los hooks corren en Python 3.14 (igual que el runtime): ruff con target py314 emite
# `except A, B:` (PEP 758), que un hook en py<3.14 no parsea (rompía debug-statements).
default_language_version:
  python: python3.14
repos:
  # ── ruff: lint + format ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── general hygiene ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files     # guards against accidental big files
        args: [--maxkb=3000]            # the long panel is ~2.1 MB; figures are gitignored
      - id: debug-statements

  # ── commit-msg: bloquea co-autoría de IA / rastro de Claude ──────
  - repo: local
    hooks:
      - id: no-coauthor-trailer
        name: block Co-Authored-By / anthropic / Claude in commit message
        entry: tools/check_no_coauthor.sh
        language: script
        stages: [commit-msg]

  # ── tipografía del entregable: proscribe la raya larga (—) en ProyectoI ──
  # Corre en commit Y push. Solo el .tex del ProyectoI; MICAI y otros quedan fuera.
  - repo: local
    hooks:
      - id: no-emdash-proyecto-i
        name: sin raya larga (—) en ProyectoI_VisaPredictAI.tex
        entry: ante/bin/python tools/check_no_emdash.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit, pre-push]

  # ── fast offline tests + typecheck (alineado con CI: cierra el gap pre-commit↔CI) ──
  - repo: local
    hooks:
      - id: pipeline-tests
        name: pipeline tests (parsers + offline extraction + panel invariants)
        entry: bash -c 'ante/bin/python tests/test_parsers.py && ante/bin/python tests/test_extraction.py && ante/bin/python tests/test_panel_integrity.py'
        language: system
        pass_filenames: false
        always_run: true
      - id: typecheck
        name: mypy (vp_model) — mismo gate que CI
        entry: bash -c 'ante/bin/python -m mypy vp_model'
        language: system
        pass_filenames: false
        always_run: true

  # ── pre-PUSH: guardián de consistencia (la máxima del proyecto) ───────────
  # En push, NO en cada commit: escanear los 7 artefactos en cada commit chico
  # sería lento. Frena un push que reventaría el job `consistency` de CI. Lee el
  # repo web hermano (../VisaPredictAI_web) si está presente; si no, valida solo
  # este repo. Activar con: pre-commit install --hook-type pre-push
  - repo: local
    hooks:
      - id: consistency
        name: guardián de consistencia (web/LaTeX/paper/README/docs vs key_facts.json)
        entry: ante/bin/python tools/check_consistency.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
