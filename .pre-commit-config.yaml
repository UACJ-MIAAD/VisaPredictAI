# Local quality gate before each commit. Install once with: pre-commit install
# Run on everything with: pre-commit run --all-files
repos:
  # ── ruff: lint + format ──────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── general hygiene ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files     # guards against accidental big files
        args: [--maxkb=3000]            # the long panel is ~2.1 MB; figures are gitignored
      - id: debug-statements

  # ── fast offline tests + typecheck (alineado con CI: cierra el gap pre-commit↔CI) ──
  - repo: local
    hooks:
      - id: pipeline-tests
        name: pipeline tests (parsers + offline extraction + panel invariants)
        entry: bash -c 'ante/bin/python tests/test_parsers.py && ante/bin/python tests/test_extraction.py && ante/bin/python tests/test_panel_integrity.py'
        language: system
        pass_filenames: false
        always_run: true
      - id: typecheck
        name: mypy (vp_model) — mismo gate que CI
        entry: bash -c 'ante/bin/python -m mypy vp_model'
        language: system
        pass_filenames: false
        always_run: true
